<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🫙 Dispensa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#111;--bg2:#1c1c1c;--bg3:#252525;--border:#2e2e2e;
  --accent:#e8821e;--accent2:#f0a84e;
  --text:#f0ede8;--text2:#999;--text3:#555;
  --danger:#e05555;--success:#5bbf7e;--freeze:#5b9be0;--warn:#e0b855;
  --r:14px;--rs:8px;--shadow:0 4px 24px rgba(0,0,0,.55);
  --tabh:66px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;overflow:hidden}
body{display:flex;justify-content:center}

#wrap{width:100%;max-width:580px;height:100%;display:flex;flex-direction:column;position:relative}

/* HEADER */
#hdr{padding:max(16px,env(safe-area-inset-top)) 18px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
#hdr h1{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ALERT */
#alert{display:none;padding:9px 18px;font-size:13px;font-weight:500;text-align:center;flex-shrink:0}
#alert.show{display:block}
#alert.warn{background:var(--warn);color:#1a1200}
#alert.err{background:var(--danger);color:#fff}
#alert.ok{background:var(--success);color:#fff}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tabh) + 8px)}
.page{display:none;padding:14px 14px 0;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* TABS */
#tabs{height:var(--tabh);background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bottom)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s}
.tb.active{color:var(--accent)}
.tb .ico{font-size:21px;line-height:1}
.tb .lbl{font-size:11px;font-weight:600;letter-spacing:.3px}

/* CARD / COMMON */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:9px}
.stitle{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;margin-bottom:11px}
.badge{border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700}
.badge.fr{background:var(--freeze);color:#fff}
.badge.wn{background:var(--warn);color:#1a1200}
.badge.dn{background:var(--danger);color:#fff}

/* SEARCH */
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;display:flex;align-items:center;gap:8px;margin-bottom:11px}
.sbox input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif}
.sbox input::placeholder{color:var(--text3)}

/* FILTER CHIPS */
.frow{display:flex;gap:7px;overflow-x:auto;padding-bottom:9px;margin-bottom:11px;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .15s;white-space:nowrap}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center}
.snum{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--accent)}
.slbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

/* ITEM CARD (dispensa) */
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.icard.expiring{border-left:3px solid var(--warn)}
.icard.expired{border-left:3px solid var(--danger);opacity:.8}
.icard.frozen{border-left:3px solid var(--freeze)}
.irow{display:flex;align-items:center;gap:11px;padding:12px 13px;cursor:pointer}
.irow:active{background:var(--bg3)}
.iico{font-size:26px;flex-shrink:0;width:36px;text-align:center}
.iinfo{flex:1;min-width:0}
.iname{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:11px;color:var(--text2);margin-top:2px}
.iexp{font-size:11px;font-weight:600;margin-top:2px}
.iexp.ok{color:var(--success)}
.iexp.soon{color:var(--warn)}
.iexp.expired{color:var(--danger)}
.iqty{font-size:13px;color:var(--text2);flex-shrink:0;white-space:nowrap}

/* ITEM ACTIONS (inline) */
.iactions{display:none;border-top:1px solid var(--border);padding:10px 12px;background:var(--bg3);gap:7px;flex-wrap:wrap}
.iactions.open{display:flex}
.abtn{padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:1px solid;background:transparent;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.abtn:active{opacity:.65}
.abtn.ok{color:var(--success);border-color:var(--success)}
.abtn.fr{color:var(--freeze);border-color:var(--freeze)}
.abtn.dn{color:var(--danger);border-color:var(--danger)}
.abtn.wn{color:var(--warn);border-color:var(--warn)}
.abtn.ac{color:var(--accent);border-color:var(--accent)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .eico{font-size:52px;margin-bottom:10px}
.empty .etit{font-family:'Syne',sans-serif;font-size:17px;color:var(--text2);margin-bottom:5px}
.empty .esub{font-size:13px}

/* RECIPE CARD */
.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
.rcard:active{background:var(--bg3)}
.rname{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.rcat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.rcat.italiana{color:var(--accent)}.rcat.europea{color:var(--freeze)}.rcat.giapponese{color:var(--danger)}.rcat.cinese{color:var(--warn)}.rcat.asiatica{color:var(--success)}
.rmeta{font-size:12px;color:var(--text2);margin-top:5px;display:flex;gap:10px}
.ringr{font-size:11px;color:var(--text3);margin-top:5px}

/* RECIPE MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px 18px calc(18px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);border-top:1px solid var(--border)}
.overlay.show .sheet{transform:translateY(0)}
.handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.mclose{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:7px}
.ingr-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.ingr-item:last-child{border-bottom:none}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.idot.ok{background:var(--success)}.idot.miss{background:var(--danger)}
.iqt{margin-left:auto;color:var(--text2);font-size:12px;flex-shrink:0}
.step{display:flex;gap:10px;margin-bottom:10px}
.snum{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.stxt{font-size:13px;line-height:1.6;color:var(--text2);flex:1}
.portion-warn{background:rgba(224,184,85,.12);border:1px solid var(--warn);border-radius:var(--rs);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--warn)}
.snum-n{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mambo-box{background:rgba(91,155,224,.08);border:1px solid var(--freeze);border-radius:var(--r);padding:14px;margin-top:4px;margin-bottom:8px}
.mambo-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--freeze);margin-bottom:12px}

/* ADD FORM */
.scan-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px;border-radius:var(--r);background:var(--bg3);border:1px dashed var(--border);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px;transition:all .2s}
.scan-btn:active{opacity:.7}
.scan-btn.scanning{border-color:var(--accent);color:var(--accent);background:rgba(232,130,30,.08)}
.fl{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.fg{margin-bottom:14px}
.fr2{display:flex;gap:9px}
.fr2 .fg{flex:1}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:14px}
.sw-t{font-size:14px;font-weight:500}
.sw-s{font-size:11px;color:var(--text2);margin-top:2px}
.tgl{position:relative;width:48px;height:26px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;inset:0;cursor:pointer;background:var(--bg3);border-radius:13px;transition:background .2s;border:1px solid var(--border)}
.tgl-s::before{content:'';position:absolute;height:20px;width:20px;left:2px;top:2px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tgl input:checked+.tgl-s{background:var(--freeze);border-color:var(--freeze)}
.tgl input:checked+.tgl-s::before{transform:translateX(22px)}
.freeze-est{font-size:12px;color:var(--freeze);margin-top:6px;min-height:18px}
.cat-detected{font-size:11px;color:var(--success);margin-top:4px}
.btn{display:block;width:100%;padding:13px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:all .15s;text-align:center;margin-bottom:10px}
.btn-p{background:var(--accent);color:#fff}
.btn-p:active{background:#c96e15}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.divider{height:1px;background:var(--border);margin:14px 0}

/* SCANNER OVERLAY */
#scan-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
#scan-overlay.show{opacity:1;pointer-events:all}
#scan-overlay h2{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:14px;color:var(--text)}
#reader-container{width:100%;max-width:360px;border-radius:var(--r);overflow:hidden;background:#000}
#reader-container #reader{width:100%}
#scan-status{color:var(--text2);font-size:13px;margin-top:12px;text-align:center}
#scan-close{margin-top:18px;padding:11px 30px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer}

/* EDIT MODAL */
.emodal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .2s}
.emodal.show{opacity:1;pointer-events:all}
.ebox{background:var(--bg2);border-radius:var(--r);padding:18px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;border:1px solid var(--border);transform:scale(.96);transition:transform .2s}
.emodal.show .ebox{transform:scale(1)}
.etop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.etop h2{font-family:'Syne',sans-serif;font-size:17px}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* MAMBO TOUCH */
.mambo-box{background:rgba(91,155,224,.08);border:1px solid rgba(91,155,224,.3);border-radius:var(--rs);padding:12px 14px;margin-top:14px}
.mambo-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--freeze);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mambo-step{display:flex;gap:9px;margin-bottom:8px;font-size:13px;line-height:1.5}
.mambo-step:last-child{margin-bottom:0}
.mambo-num{width:20px;height:20px;border-radius:50%;background:var(--freeze);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mambo-param{display:inline-block;background:rgba(91,155,224,.15);color:var(--freeze);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin:0 2px}
</style>
</head>
<body>
<div id="wrap">

<header id="hdr">
  <h1>🫙 Dispensa</h1>
</header>

<div id="alert"></div>

<div id="main">

  <!-- ===== DISPENSA ===== -->
  <div id="pg-dispensa" class="page active">
    <!--<div class="stats">
      <div class="scard"><div class="snum" id="st-tot">0</div><div class="slbl">Totale</div></div>
      <div class="scard"><div class="snum" style="color:var(--warn)" id="st-exp">0</div><div class="slbl">In scadenza</div></div>
      <div class="scard"><div class="snum" style="color:var(--freeze)" id="st-frz">0</div><div class="slbl">In cella</div></div>
    </div>-->

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Totale</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--warn)" id="stat-expiring">0</div>
        <div class="stat-label">In scadenza</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--freeze)" id="stat-frozen">0</div>
        <div class="stat-label">In cella</div>
      </div>
    </div>

    
    <div class="sbox"><span>🔍</span><input id="dsearch" placeholder="Cerca alimento…" oninput="renderD()"></div>
    <div class="frow">
      <div class="chip active" onclick="setDF('tutti',this)">Tutti</div>
      <div class="chip" onclick="setDF('presto',this)">⚠ Scade presto</div>
      <div class="chip" onclick="setDF('frozen',this)">❄ In cella</div>
      <div class="chip" onclick="setDF('scaduti',this)">❌ Scaduti</div>
    </div>
    <div id="dlist"></div>
  </div>

  <!-- ===== RICETTE ===== -->
  <div id="pg-ricette" class="page">
    <div class="sbox"><span>🔍</span><input id="rsearch" placeholder="Cerca ricetta…" oninput="renderR()"></div>
    <div class="frow">
      <div class="chip active" data-rf="possibili" onclick="setRF('possibili',this)">✅ Possibili</div>
      <div class="chip" data-rf="tutte" onclick="setRF('tutte',this)">Tutte</div>
      <div class="chip" data-rf="italiana" onclick="setRF('italiana',this)">🇮🇹 Italiana</div>
      <div class="chip" data-rf="europea" onclick="setRF('europea',this)">🇪🇺 Europea</div>
      <div class="chip" data-rf="giapponese" onclick="setRF('giapponese',this)">🇯🇵 Giapponese</div>
      <div class="chip" data-rf="cinese" onclick="setRF('cinese',this)">🇨🇳 Cinese</div>
      <div class="chip" data-rf="asiatica" onclick="setRF('asiatica',this)">🌏 Asiatica</div>
    </div>
    <div id="rlist"></div>
  </div>

  <!-- ===== AGGIUNGI ===== -->
  <div id="pg-aggiungi" class="page">
    <button class="scan-btn" id="scanbtn" onclick="openScanner()">
      <span style="font-size:22px">📷</span>
      <span>Scansiona Barcode</span>
    </button>

    <div id="scan-feedback" style="display:none;background:rgba(91,191,126,.1);border:1px solid var(--success);border-radius:var(--rs);padding:10px 13px;margin-bottom:14px;font-size:13px;color:var(--success)"></div>

    <div class="fg">
      <label class="fl">Nome alimento *</label>
      <input class="fi" id="fn" placeholder="es. Pasta, Pollo, Latte…" oninput="onNameInput()">
      <div class="cat-detected" id="cat-hint"></div>
    </div>
    <div class="fr2">
      <div class="fg">
        <label class="fl">Quantità *</label>
        <input class="fi" id="fq" type="number" min="0" step="any" placeholder="1">
      </div>
      <div class="fg">
        <label class="fl">Unità</label>
        <select class="fi" id="fu">
          <option value="pz">pz</option><option value="g">g</option><option value="kg">kg</option>
          <option value="ml">ml</option><option value="l">l</option><option value="conf">conf.</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Categoria</label>
      <select class="fi" id="fc">
        <option value="generico">Generico</option><option value="carne">Carne</option>
        <option value="pesce">Pesce</option><option value="verdure">Verdure</option>
        <option value="frutta">Frutta</option><option value="latticini">Latticini</option>
        <option value="pasta_cereali">Pasta / Cereali</option><option value="pane">Pane</option>
        <option value="salumi">Salumi</option><option value="condimenti">Condimenti</option>
        <option value="surgelati">Surgelati</option><option value="bevande">Bevande</option>
        <option value="dolci">Dolci</option><option value="legumi">Legumi</option>
        <option value="uova">Uova</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl" id="exp-lbl">Scadenza</label>
      <input class="fi" id="fe" type="date">
      <div class="freeze-est" id="fest"></div>
    </div>

    <div class="sw-row">
      <div><div class="sw-t">❄️ Metti in cella</div><div class="sw-s">Stima scadenza da congelamento</div></div>
      <label class="tgl"><input type="checkbox" id="ff" onchange="onFreezeChange()"><span class="tgl-s"></span></label>
    </div>

    <button class="btn btn-p" onclick="saveItem()">💾 Aggiungi alla Dispensa</button>
  </div>

</div>

<!-- BOTTOM TABS -->
<nav id="tabs">
  <button class="tb active" onclick="goTab('dispensa',this)">
    <span class="ico">🫙</span><span class="lbl">Dispensa</span>
  </button>
  <button class="tb" onclick="goTab('ricette',this)">
    <span class="ico">👨‍🍳</span><span class="lbl">Ricette</span>
  </button>
  <button class="tb" onclick="goTab('aggiungi',this)">
    <span class="ico">➕</span><span class="lbl">Aggiungi</span>
  </button>
</nav>

</div><!-- end #wrap -->

<!-- SCANNER OVERLAY -->
<div id="scan-overlay">
  <h2>📷 Scansiona Barcode</h2>
  <div id="reader-container"><div id="reader"></div></div>
  <div id="scan-status">Punta la fotocamera sul barcode</div>

<script>
// ================================================
// RECIPES DATABASE (~150 ricette)
// ================================================
const RC={italiana:'italiana',eu:'europea',jp:'giapponese',cn:'cinese',as:'asiatica'};
function r(id,name,cat,time,diff,icon,ingr,steps,mambo){return{id,name,cat,time,diff,icon,ingredients:ingr,steps,mambo:mambo||null}}
function i(name,amt,unit,key){return{name,amt,unit,key}}

const RECIPES=[
// ===== ITALIANE =====
r('i1','Spaghetti Carbonara',RC.italiana,25,'media','🍝',
[i('spaghetti',180,'g','pasta'),i('guanciale',100,'g','guanciale'),i('uova',2,'pz','uova'),i('pecorino romano',50,'g','pecorino'),i('pepe nero',4,'g','pepe')],
['Porta a ebollizione abbondante acqua (almeno 2 litri) e salala moderatamente — il guanciale è già salato.','Taglia 100g di guanciale a bastoncini spessi ~1 cm. Mettili in una padella fredda (senza olio) e accendi la fiamma a fuoco medio-basso: il grasso deve sciogliersi lentamente. Cuoci 8-10 min finché i pezzetti sono dorati e croccanti ma non bruciati. Togli dalla fiamma e tieni il grasso nella padella.','In una ciotola capiente sbatti 2 tuorli + 1 uovo intero con 50g di pecorino grattugiato finemente e abbondante pepe nero macinato al momento (almeno 1 cucchiaino). Il composto deve essere denso e cremoso.','Cuoci 180g di spaghetti: toglili 1 minuto prima del tempo indicato (devono essere molto al dente). Prima di scolare, preleva 2 mestoli abbondanti di acqua di cottura amidacea e tienila da parte.','Scola la pasta e versala DIRETTAMENTE nella padella col guanciale — SENZA rimettere sul fuoco. Mescola energicamente 30 secondi per mantecarla col grasso.','Aspetta 30 secondi (la padella deve raffreddarsi leggermente, altrimenti le uova si rapprendono). Versa il mix di uova sulla pasta mescolando continuamente e velocemente. Aggiungi acqua di cottura poco per volta — 2-3 cucchiai alla volta — mescolando fino a ottenere una crema lucida e vellutata che avvolge ogni spaghetto. Potrebbe servire anche 100-150ml totali.','Impiatta subito, aggiungi altro pecorino grattugiato e pepe nero. Servi immediatamente.'],
['Trita finemente il guanciale: mettilo nel boccale e trita 3 sec / Vel. 5. Togli e metti da parte.','Senza lavare il boccale, cuoci il guanciale: 8 min / 120°C / Vel. 1. Il grasso si scioglierà e i pezzetti diventeranno croccanti. Trasferisci in una padella e tieni al caldo.','Nel boccale pulito prepara la crema: inserisci 2 tuorli + 1 uovo intero, 50g pecorino grattugiato, pepe abbondante. Mescola 20 sec / Vel. 4.','Cuoci gli spaghetti in pentola normale (il Mambo non è ideale per la pasta lunga). Scola tenendo abbondante acqua di cottura.','Versa la pasta nella padella col guanciale spento, aggiungi la crema di uova dal boccale e manteca aggiungendo acqua di cottura a filo — il Mambo può riscaldare la crema: 1 min / 60°C / Vel. 2 per scaldarla prima di versarla se la pasta è fredda.']),

r('i2','Risotto ai Porcini',RC.italiana,35,'media','🍄',
[i('riso carnaroli',180,'g','riso'),i('funghi porcini freschi',150,'g','funghi'),i('cipolla dorata',1,'pz','cipolla'),i('vino bianco secco',80,'ml','vino'),i('burro',50,'g','burro'),i('parmigiano',50,'g','parmigiano'),i('brodo vegetale',700,'ml','brodo'),i('aglio',1,'pz','aglio'),i('prezzemolo',5,'g','prezzemolo')],
['Scalda il brodo vegetale in una casseruola a parte e tienilo sempre caldo sul fuoco basso — il brodo freddo blocca la cottura del risotto.','Pulisci 150g di porcini con un panno umido (mai lavarli sotto acqua corrente), tagliali a fette spesse. In una padella scalda 1 cucchiaio di olio con 1 spicchio d\'aglio schiacciato, aggiungi i funghi e cuoci a fuoco vivace 5-6 min finché dorati. Sala, aggiungi prezzemolo e tieni da parte.','In una casseruola larga fai sciogliere 25g di burro + 1 filo d\'olio. Aggiungi la cipolla tritata finissima e soffriggi a fuoco medio-basso per 5 min fino a renderla traslucida e dolce — non deve colorirsi.','Aggiungi 180g di riso carnaroli e tostalo a fiamma medio-alta mescolando continuamente per 2-3 min: deve diventare semi-traslucido ai bordi e sentirsi sfrigolare. Questo passaggio è fondamentale per il risotto: sigilla i chicchi.','Sfuma con 80ml di vino bianco freddo e mescola vigorosamente finché l\'alcol evapora completamente (~1 min).','Inizia ad aggiungere il brodo caldo: 1 mestolo per volta. Mescola continuamente a fuoco medio. Aggiungi il mestolo successivo solo quando il precedente è stato quasi completamente assorbito. Prosegui per ~16-18 min totali.','A 3 minuti dal termine, incorpora i funghi saltati e mescola delicatamente.','Spegni il fuoco. Aggiungi 25g di burro freddo a pezzi e 50g di parmigiano grattugiato. Manteca vigorosamente per 1-2 min: il risotto deve essere "all\'onda" — se inclinato deve scivolare lentamente. Copri e lascia riposare 1 min. Impiatta e servi subito.'],
['Trita la cipolla: 3 sec / Vel. 7. Tieni da parte.','Soffritto: metti 25g burro + cipolla nel boccale. 5 min / 120°C / Vel. 1.','Aggiungi 180g di riso e tosta: 2 min / 120°C / Vel. 1.','Sfuma con 80ml vino bianco: 1 min / Varoma / Vel. 1 senza misurino per far evaporare l\'alcol.','Aggiungi 650ml di brodo caldo, i funghi saltati a parte e i funghi. Cuoci: 14 min / 100°C / Vel. 1. Controlla la consistenza — se troppo sodo aggiungi altro brodo.','Mantecatura: aggiungi 25g burro freddo + 50g parmigiano. 30 sec / Vel. 2 / senza calore. Lascia riposare 2 min con il coperchio. Il risotto continuerà a cuocere con il calore residuo.']),

r('i3','Pasta al Pomodoro',RC.italiana,20,'facile','🍅',
[i('pasta',180,'g','pasta'),i('pomodori pelati San Marzano',400,'g','pomodori'),i('aglio',2,'pz','aglio'),i('olio EVO',40,'ml','olio'),i('basilico fresco',8,'pz','basilico'),i('sale fino',5,'g','sale'),i('zucchero',2,'g','zucchero')],
['In una pentola porta 2 litri di acqua a ebollizione. Sala generosamente (l\'acqua deve sapere di mare, circa 10g di sale per litro).','In una padella larga o casseruola versa 40ml di olio EVO e i 2 spicchi d\'aglio interi schiacciati. Accendi a fuoco basso: l\'aglio deve soffriggere lentamente (non bruciare!) per 3-4 min finché diventa dorato e profumato. Poi rimuovi l\'aglio.','Apri la lattina di pomodori pelati (400g San Marzano se possibile) e schiaccia i pomodori con le mani direttamente in padella oppure con un cucchiaio di legno. Aggiungi 2g di zucchero (neutralizza l\'acidità), sala e cuoci a fuoco medio 12-15 min mescolando di tanto in tanto finché la salsa si addensa e il colore diventa più intenso.','Cuoci la pasta in acqua bollente salata seguendo i tempi della confezione meno 1 minuto (deve essere molto al dente). Prima di scolare, preleva 1 mestolo di acqua di cottura.','Scola la pasta e trasferiscila nella padella col sugo. Aggiungi 2-3 cucchiai di acqua di cottura e salta a fuoco vivace per 1-2 min: la pasta finirà di cuocere nel sugo diventando lucida e ben condita.','Spegni, aggiungi le foglie di basilico fresco strappate con le mani (non tagliate, per non ossidarle), un filo di olio a crudo e servi subito.'],
['Trita aglio: 3 sec / Vel. 7 con 40ml olio. Poi soffriggi: 3 min / 120°C / Vel. 1.','Aggiungi 400g pomodori pelati spezzettati e 2g zucchero. Cuoci: 15 min / 100°C / Vel. 1. A metà cottura assaggia e aggiusta di sale.','Cuoci la pasta in pentola normale. Scola e aggiungi al boccale con la salsa: 1 min / 100°C / Vel. 1 per mantecare. Aggiungi basilico fresco a fine cottura.']),

r('i4','Lasagne al Ragù',RC.italiana,90,'difficile','🧀',
[i('sfoglie lasagne (fresche o secche)',250,'g','lasagne'),i('carne macinata mista',500,'g','macinato'),i('pomodori pelati',500,'g','pomodori'),i('cipolla',1,'pz','cipolla'),i('carota',1,'pz','carota'),i('sedano',1,'costa','sedano'),i('vino rosso',100,'ml','vino'),i('latte intero',600,'ml','latte'),i('farina 00',60,'g','farina'),i('burro',60,'g','burro'),i('parmigiano',80,'g','parmigiano'),i('olio EVO',30,'ml','olio'),i('noce moscata',2,'g','noce moscata')],
['RAGÙ: Trita finemente cipolla, carota e sedano (soffritto). In una casseruola larga scalda 30ml olio + 20g burro a fuoco medio. Aggiungi il soffritto e cuoci 8 min fino a renderlo morbido e traslucido.','Aggiungi 500g di carne macinata mista (manzo+maiale) e cuoci a fuoco vivace rompendo i grumi con un cucchiaio finché tutta la carne cambia colore (~8 min). Sfuma con 100ml di vino rosso e lascia evaporare completamente (~3 min).','Aggiungi 500g di pomodori pelati schiacciati, sale, pepe e un cucchiaino di zucchero. Cuoci a fuoco BASSISSIMO con coperchio per almeno 45 min — più cuoce più è buono. Il ragù è pronto quando è denso e il grasso tende a separarsi in superficie.','BESCIAMELLA: In un pentolino fai sciogliere 60g di burro a fuoco medio. Aggiungi 60g di farina tutto in una volta e mescola velocemente con una frusta per 2 min (deve formarsi un "roux" dorato e profumato, senza bruciare). Togli dal fuoco.','Scalda 600ml di latte a parte (quasi a bollore). Aggiungilo al roux caldo poco per volta mescolando continuamente con la frusta per evitare grumi. Rimetti sul fuoco medio, continua a mescolare finché la besciamella si addensa (5-7 min). Sala, aggiungi noce moscata grattugiata. Deve avere la consistenza di una crema fluida.','ASSEMBLAGGIO: Preriscalda il forno a 180°C. In una teglia 30x20cm stendi un cucchiaio di ragù sul fondo (evita che la pasta attacchi). Stendi il primo strato di sfoglie sovrapponendole leggermente. Aggiungi uno strato di ragù, uno di besciamella e parmigiano grattugiato. Ripeti per 4-5 strati totali.','Termina con besciamella abbondante (non ragù, per evitare che si secchi) e tanto parmigiano. Aggiungi qualche fiocchetto di burro in superficie.','Inforna a 180°C per 30-35 min finché la superficie è dorata e gorgoglia ai bordi. Lascia riposare 10 min prima di tagliare.'],
['RAGÙ NEL MAMBO: Trita cipolla, carota, sedano: 5 sec / Vel. 7. Aggiungi 30ml olio: 5 min / 120°C / Vel. 1.','Aggiungi 500g carne macinata sbriciolata: 8 min / 120°C / Vel. 1 (spingola non montata o usa la farfalla).','Aggiungi 100ml vino: 2 min / Varoma / Vel. 1 senza misurino. Poi 500g pomodori pelati, sale e pepe: 40 min / 100°C / Vel. 1.','BESCIAMELLA NEL MAMBO: Boccale pulito e asciutto. Inserisci 60g burro: 2 min / 100°C / Vel. 1. Aggiungi 60g farina: 2 min / 100°C / Vel. 2.','Aggiungi 600ml latte freddo: 8 min / 100°C / Vel. 4. Aggiungi noce moscata e sale. Pronta!','Assembla e inforna normalmente.']),

r('i5','Pizza Margherita',RC.italiana,60,'media','🍕',
[i('farina 00',250,'g','farina'),i('farina Manitoba',50,'g','farina'),i('lievito di birra fresco',7,'g','lievito'),i('acqua tiepida',180,'ml','acqua'),i('olio EVO',20,'ml','olio'),i('sale fino',6,'g','sale'),i('pomodori pelati',300,'g','pomodori'),i('mozzarella fior di latte',200,'g','mozzarella'),i('basilico',4,'foglie','basilico'),i('olio EVO per condire',15,'ml','olio')],
['IMPASTO: Sciogli 7g di lievito fresco in 180ml di acqua tiepida (NON calda: max 35°C) con un cucchiaino di zucchero. Lascia riposare 5-10 min finché appare leggermente schiumosa — segnale che il lievito è attivo.','In una ciotola mescola 250g farina 00 + 50g Manitoba (la Manitoba dà più elasticità). Aggiungi il lievito sciolto e inizia a impastare. Dopo 2 min aggiungi 6g di sale e 20ml di olio. Impasta vigorosamente per 10 min sul piano infarinato finché l\'impasto è liscio, elastico e non appiccica. Fai la "prova dito": premi con il dito — deve tornare su lentamente.','Metti l\'impasto in una ciotola oliata, coprilo con pellicola e lascialo lievitare in un posto caldo (forno spento con lucina accesa, ~28°C) per 1 ora o fino al raddoppio.','SALSA: Schiaccia 300g di pomodori pelati con le mani, condisci con sale, un filo d\'olio e qualche foglia di basilico spezzata. NON cuocere — la cottura in forno è sufficiente.','MOZZARELLA: Taglia la mozzarella a fette e lasciala su un colino 30 min a perdere il siero in eccesso (evita che bagni l\'impasto).','Preriscalda il forno al massimo (250-280°C) con la teglia dentro per almeno 30 min.','Stendi l\'impasto con le mani (non il mattarello) su una teglia oleata: inizia dal centro verso l\'esterno allargandolo fino a 30cm. Deve essere sottile al centro (~3mm) con un bordo leggermente più spesso.','Condisci con la salsa di pomodoro (non troppa: il centro deve rimanere asciutto). Cuoci 7-8 min finché i bordi iniziano a colorire. Estrai, aggiungi la mozzarella, rimetti in forno altri 3-4 min finché fila. Aggiungi basilico fresco e olio a crudo prima di servire.'],
['IMPASTO CON MAMBO: Sciogli lievito in acqua tiepida 5 min. Nel boccale metti farina, lievito disciolto, olio, sale. Impastar con la farfalla: 3 min / Vel. 4. L\'impasto si formerà attorno alla farfalla. Estrai e lascia lievitare 1h in ciotola coperta.','La salsa e la cottura seguono i passaggi tradizionali — il Mambo non è adatto per la cottura della pizza.']),

r('i6','Pasta Cacio e Pepe',RC.italiana,15,'facile','🧀',
[i('tonnarelli o spaghetti',180,'g','pasta'),i('pecorino romano',80,'g','pecorino'),i('parmigiano',20,'g','parmigiano'),i('pepe nero in grani',5,'g','pepe')],
['Porta 2 litri di acqua a bollore con pochissimo sale (il pecorino è già sapidissimo). Cuoci la pasta.','PEPE: Metti 1 cucchiaino colmo di pepe nero in grani in una padella asciutta e tostali a fuoco medio 1-2 min finché profumati. Schiaccia grossolanamente con un mortaio o il fondo di un bicchiere: non devono essere finissimi, ma spezzati in 2-3 pezzi.','CREMA DI FORMAGGIO: Grattugia 80g di pecorino + 20g parmigiano molto finemente. Mettili in una ciotola capiente e aggiungi 4-5 cucchiai di acqua di cottura caldissima mescolando velocemente con una forchetta fino a formare una pasta cremosa densa. Aggiungi altro pepe tostato.','Scola la pasta molto al dente (2 min prima del tempo). Trasferiscila nella padella con il pepe tostato a fuoco medio-basso. Aggiungi 2 mestoli di acqua di cottura e mescola energicamente per 1-2 min.','Togli dal fuoco, aspetta 30 secondi, poi aggiungi la crema di formaggi. Mescola velocemente aggiungendo acqua di cottura poca alla volta finché ottiieni una crema lucida e vellutata che avvolge la pasta. Il segreto è la temperatura: troppo caldo fa grumi, troppo freddo non crea la crema.','Impiatta, aggiungi altro pecorino e pepe macinato al momento.'],
['Grattugia i formaggi nel boccale: 10 sec / Vel. 10. Metti da parte. Tosta il pepe in padella a parte.','Cuoci la pasta in pentola normale. Tieni da parte 200ml di acqua di cottura.','Nel boccale metti il formaggio grattugiato + 80ml acqua di cottura calda: 1 min / 60°C / Vel. 3 per formare la crema. Versa sulla pasta mantecandola fuori dal fuoco.']),

r('i7','Pasta Aglio Olio Peperoncino',RC.italiana,15,'facile','🌶️',
[i('spaghetti',180,'g','pasta'),i('aglio',4,'pz','aglio'),i('olio EVO',70,'ml','olio'),i('peperoncino fresco',1,'pz','peperoncino'),i('prezzemolo fresco',15,'g','prezzemolo')],
['Cuoci gli spaghetti in abbondante acqua salata. Preleva 150ml di acqua di cottura prima di scolare.','Pela i 4 spicchi d\'aglio e affettali sottilissimi (NON tritarli — le fettine rilasciano l\'aroma in modo più delicato). Taglia il peperoncino a rondelle sottili.','In una padella larga versa 70ml di olio EVO e aggiungi l\'aglio a freddo. Metti sul fuoco bassissimo: l\'aglio deve soffriggere lentamente, diventare dorato pallido e morbido in 6-8 min. Se l\'aglio scurisce troppo l\'olio diventa amaro — controlla sempre il colore. Aggiungi il peperoncino a 2 min dalla fine.','Scola la pasta al dente e trasferiscila nella padella. Aggiungi subito 4-5 cucchiai di acqua di cottura amidacea e salta a fuoco vivace per 1-2 min: la pasta si manteche nell\'emulsione di olio e amido creando una salsina lucida.','Aggiungi il prezzemolo tritato finissimo (aggiunto fuori dal fuoco mantiene il colore verde brillante), mescola e servi immediatamente.'],
['Affetta l\'aglio sottile. Nel boccale con 70ml olio e aglio affettato: 6 min / 120°C / Vel. 1 — monitorare che non bruci. Aggiungi peperoncino a metà cottura.','Cuoci pasta in pentola, scola e aggiungi al boccale: 1 min / 100°C / Vel. 1 con acqua di cottura. Aggiungi prezzemolo tritato a fine cottura.']),

r('i8','Pasta all\'Amatriciana',RC.italiana,25,'facile','🥓',
[i('rigatoni o spaghetti',180,'g','pasta'),i('guanciale',130,'g','guanciale'),i('pomodori pelati',400,'g','pomodori'),i('pecorino romano',50,'g','pecorino'),i('vino bianco',50,'ml','vino'),i('peperoncino',1,'pz','peperoncino')],
['Taglia 130g di guanciale a listarelle spesse (non troppo sottili altrimenti si secca troppo). Mettilo in una padella fredda e cuoci a fuoco medio-basso 8-10 min mescolando spesso: deve diventare dorato e leggermente croccante ma rimanere morbido dentro. Togli il guanciale e tieni il fondo di cottura nella padella.','Nella stessa padella (con il grasso del guanciale) aggiungi il peperoncino sbriciolato e sfuma con 50ml di vino bianco a fuoco vivace — fai evaporare 1 min.','Aggiungi 400g di pomodori pelati schiacciati con le mani. Cuoci a fuoco medio 12-15 min finché la salsa si addensa. Aggiusta di sale (assaggia prima: il guanciale è già salato!). Rimetti il guanciale nella salsa.','Cuoci la pasta in abbondante acqua salata. Scola al dente tenendo 1 mestolo di acqua di cottura. Salta nel sugo 1-2 min aggiungendo acqua se serve per mantecare.','Servi con abbondante pecorino romano grattugiato e una macinata di pepe nero.'],
['Metti guanciale a listarelle nel boccale: 8 min / 120°C / Vel. 1 con la farfalla. Togli il guanciale con la schiumarola.','Nel fondo di cottura rimasto nel boccale aggiungi peperoncino: 1 min / 120°C / Vel. 1. Sfuma con vino: 1 min / Varoma / Vel. 1. Aggiungi pomodori: 15 min / 100°C / Vel. 1. Rimetti il guanciale: 2 min / 100°C / Vel. 1.','Cuoci la pasta normalmente. Salta nel sugo in padella o direttamente nel boccale caldo.']),

r('i9','Pesto alla Genovese',RC.italiana,15,'facile','🌿',
[i('pasta (trenette o trofie)',180,'g','pasta'),i('basilico genovese DOP',30,'g','basilico'),i('olio EVO ligure',70,'ml','olio'),i('pinoli',20,'g','pinoli'),i('parmigiano Reggiano',30,'g','parmigiano'),i('pecorino sardo',20,'g','pecorino'),i('aglio',1,'pz','aglio'),i('sale grosso',2,'g','sale')],
['Il segreto del pesto è lavorare VELOCEMENTE e con ingredienti freddi per evitare l\'ossidazione del basilico. Metti le foglie di basilico lavate e asciugate in frigo 30 min prima.','Tosta leggermente 20g di pinoli in una padella asciutta a fuoco basso 2-3 min finché dorati. Raffredda subito.','Nel mortaio: pesta l\'aglio con il sale grosso fino a ridurlo in crema. Aggiungi i pinoli e pesta fino a farne una pasta. Aggiungi le foglie di basilico a pochi per volta pestando con movimenti circolari (non su-giù). Quando il basilico è diventato una crema verde intenso, aggiungi i formaggi grattugiati. Incorpora l\'olio a filo mescolando con un cucchiaio. NON cuocere mai il pesto.','Se usi il frullatore: frulla basilico + aglio + pinoli + sale con pochissimo olio a impulsi brevi (surriscaldare ossida il basilico). Aggiungi formaggi e olio a filo a bassa velocità.','Cuoci la pasta in acqua salata. Scola tenendo 2 mestoli di acqua. In una ciotola grande metti il pesto, diluiscilo con 3-4 cucchiai di acqua di cottura tiepida, aggiungi la pasta e mescola delicatamente. Il calore residuo della pasta "cuoce" leggermente il pesto — non aggiungere mai a fuoco acceso.'],
['PESTO NEL MAMBO: Inserisci aglio, sale grosso, pinoli: 5 sec / Vel. 7.','Aggiungi basilico freddo + formaggi: 5 sec / Vel. 7. Raschia le pareti.','Aggiungi olio: 10 sec / Vel. 5. Non lavorare troppo — il basilico non deve scaldarsi. Il Mambo tende a riscaldare, quindi usa ingredienti molto freddi e fai pause tra le triturazioni.','Cuoci la pasta normalmente e condisci come sopra.']),

r('i10','Pasta e Fagioli',RC.italiana,40,'facile','🫘',
[i('pasta corta (ditalini)',150,'g','pasta'),i('fagioli borlotti cotti',250,'g','fagioli'),i('pomodori pelati',200,'g','pomodori'),i('cipolla',1,'pz','cipolla'),i('aglio',2,'pz','aglio'),i('rosmarino',2,'rametti','rosmarino'),i('olio EVO',50,'ml','olio'),i('brodo vegetale',600,'ml','brodo'),i('pancetta',60,'g','pancetta')],
['In una casseruola capiente scalda 40ml di olio a fuoco medio. Aggiungi la pancetta a dadini e cuoci 3-4 min. Unisci cipolla e aglio tritati, rosmarino e soffriggi 6-7 min fino a doratura leggera.','Aggiungi 200g di pomodori pelati schiacciati. Cuoci 5 min. Versa 600ml di brodo vegetale e porta a bollore.','Aggiungi 250g di fagioli borlotti cotti (o precotti in scatola, sciacquati). Cuoci 10 min.','IMPORTANTE: Frulla METÀ dei fagioli con un frullatore a immersione direttamente nella pentola — questo rende il brodo cremoso e denso. Lascia intera l\'altra metà per la consistenza.','Porta a bollore, aggiungi 150g di pasta e cuoci mescolando spesso (la pasta tende ad attaccare in questo tipo di zuppa). A fine cottura la pasta e fagioli deve avere una consistenza "scivolosa", non troppo brodosa né troppo asciutta.','Servi con olio EVO a crudo, pepe nero e opzionalmente una spruzzata di tabasco.'],
['Nel boccale metti cipolla, aglio, rosmarino: 5 sec / Vel. 7. Aggiungi 40ml olio + pancetta: 6 min / 120°C / Vel. 1.','Aggiungi pomodori: 5 min / 100°C / Vel. 1. Aggiungi 250g fagioli + 600ml brodo: 10 min / 100°C / Vel. 1.','Frulla metà del contenuto: 30 sec / Vel. 7-8 (attento al vapore!). Rimetti nel boccale.','Aggiungi la pasta: cuoci il tempo indicato sulla confezione a 100°C / Vel. 1 mescolando a metà cottura. Aggiusta la densità con brodo.']),

r('i12','Pasta al Tonno',RC.italiana,15,'facile','🐟',
[i('pasta (mezze maniche o spaghetti)',180,'g','pasta'),i('tonno sott\'olio di qualità',160,'g','tonno'),i('pomodorini ciliegino',200,'g','pomodori'),i('aglio',2,'pz','aglio'),i('capperi sotto sale',15,'g','capperi'),i('olive taggiasche',30,'g','olive'),i('olio EVO',35,'ml','olio'),i('prezzemolo',10,'g','prezzemolo')],
['Sciacqua i capperi sotto acqua corrente per dissalarli. Taglia i pomodorini a metà. Scola il tonno dall\'olio.','In una padella larga scalda 35ml di olio con 2 spicchi d\'aglio schiacciati: soffriggi a fuoco basso 3 min. Togli l\'aglio.','Alza la fiamma a medio-vivace, aggiungi i pomodorini tagliati a metà: cuoci 4-5 min finché si ammorbidiscono e rilasciano i succhi. Aggiungi i capperi e le olive.','Abbassa la fiamma, aggiungi il tonno sbriciolato grossolanamente e mescola delicatamente per 1-2 min — non stracuocerlo altrimenti si secca.','Scola la pasta al dente, salta nel sugo con 2-3 cucchiai di acqua di cottura. Aggiungi prezzemolo tritato fresco fuori dal fuoco. Servi senza formaggio.'],
['Soffriggi aglio in 35ml olio: 3 min / 120°C / Vel. 1. Togli aglio.','Aggiungi pomodorini, capperi, olive: 5 min / 100°C / Vel. 1. Aggiungi tonno sbriciolato: 1 min / 80°C / Vel. 1.','Cuoci pasta in pentola. Scola e manteca nella padella con la salsa.']),

r('i15','Risotto alla Milanese',RC.italiana,35,'media','🌟',
[i('riso carnaroli',180,'g','riso'),i('zafferano in pistilli',0.3,'g','zafferano'),i('midollo di bue',20,'g','midollo'),i('cipolla dorata',1,'pz','cipolla'),i('vino bianco secco',80,'ml','vino'),i('brodo di manzo',700,'ml','brodo'),i('burro',60,'g','burro'),i('parmigiano',50,'g','parmigiano')],
['Metti in infusione i pistilli di zafferano in 2 cucchiai di brodo caldo da almeno 20 min — il colore deve diventare giallo intenso.','In una casseruola fai sciogliere il midollo di bue (o 30g burro) con la cipolla tritata finissima. Soffriggi a fuoco bassissimo 8 min senza colorire.','Aggiungi il riso, tostalo 2-3 min mescolando. Sfuma con vino bianco, fai evaporare.','Aggiungi brodo caldo mestolo per mestolo per 16-18 min totali.','A 2 min dal termine aggiungi lo zafferano con la sua infusione.','Manteca con 30g burro freddo + parmigiano. Deve essere molto "all\'onda".'],
['Cipolla tritata + midollo + 20g burro: 8 min / 100°C / Vel. 1.','Aggiungi riso: 2 min / 120°C / Vel. 1. Sfuma vino: 1 min / Varoma / Vel. 1 senza tappo.','Aggiungi 650ml brodo + zafferano in infusione: 14 min / 100°C / Vel. 1.','Manteca con 30g burro freddo + parmigiano: 30 sec / Vel. 2 senza calore.']),

r('i16','Minestrone',RC.italiana,45,'facile','🥗',
[i('carote',2,'pz','carota'),i('patate',2,'pz','patate'),i('zucchine',2,'pz','zucchine'),i('pomodori pelati',200,'g','pomodori'),i('fagioli borlotti',150,'g','fagioli'),i('cipolla',1,'pz','cipolla'),i('sedano',1,'costa','sedano'),i('pasta corta',80,'g','pasta'),i('parmigiano crosta',1,'pz','parmigiano'),i('olio EVO',50,'ml','olio')],
['Taglia tutte le verdure a dadini uniformi di circa 1.5cm — la dimensione uniforme assicura una cottura omogenea.','In una pentola grande scalda 50ml di olio a fuoco medio. Soffriggi cipolla e sedano tritati 5 min. Aggiungi carote e cuoci 3 min.','Aggiungi patate, zucchine e pomodori pelati schiacciati. Aggiungi la crosta di parmigiano (dona una profondità di sapore incredibile). Copri con 1.5 litri di acqua fredda o brodo vegetale.','Porta a bollore, abbassa, cuoci semicoperto 25 min. Aggiungi i fagioli e cuoci altri 10 min. Sala a fine cottura.','Aggiungi la pasta: cuoci il tempo indicato. Aggiusta la densità con acqua. Rimuovi la crosta di parmigiano.','Servi con olio EVO a crudo, parmigiano grattugiato e pepe nero.'],
['Trita cipolla e sedano: 5 sec / Vel. 5. Con 50ml olio: 5 min / 120°C / Vel. 1.','Aggiungi tutte le verdure a dadini, fagioli, pomodori, crosta parmigiano, 1.5L brodo: 30 min / 100°C / Vel. 1.','Aggiungi pasta: cuoci il tempo indicato + 1 min / 100°C / Vel. 1. Aggiusta la densità.']),

r('i22','Piadina Romagnola',RC.italiana,20,'facile','🫓',
[i('farina 00',200,'g','farina'),i('strutto (o burro)',40,'g','strutto'),i('bicarbonato',3,'g','bicarbonato'),i('sale fino',5,'g','sale'),i('acqua tiepida',80,'ml','acqua')],
['Mescola 200g di farina 00 con 3g di bicarbonato e 5g di sale. Aggiungi 40g di strutto a temperatura ambiente e lavora con le mani finché la farina assume una consistenza sabbiosa (come per la frolla).','Aggiungi 80ml di acqua tiepida poco per volta e impasta energicamente per 5-7 min finché ottieni una palla liscia e morbida ma non appiccicosa. Copri con un canovaccio e lascia riposare 15 min a temperatura ambiente — il riposo rende l\'impasto più elastico e facile da stendere.','Dividi in 4 palline di peso uguale (~80g ciascuna). Con un mattarello stendi ogni pallina in un disco molto sottile (~2mm) di circa 25cm di diametro. La piadina deve essere quasi trasparente se la si alza in controluce.','Scalda una piastra o padella antiaderente a fuoco medio-alto senza olio né burro finché è bollente. Cuoci la piadina 1.5-2 min per lato: deve fare bolle in superficie e scurirsi leggermente con macchioline brunite — è normale e buono.','Farcisci subito (mentre è calda): squacquerone e rucola, prosciutto crudo e mozzarella, o salsiccia e cipolla caramellata. Piega a metà e servi.'],
['Nel boccale metti farina, bicarbonato, sale, strutto: 30 sec / Vel. 5.','Aggiungi acqua tiepida: impasta 1 min / Vel. 4 con la farfalla finché si forma l\'impasto. Se troppo asciutto aggiungi 1-2 cucchiai d\'acqua.','Estrai, forma una palla, riposa 15 min. Stendi e cuoci sulla piastra tradizionalmente.']),

r('i26','Frittata di Zucchine',RC.italiana,20,'facile','🥒',
[i('uova fresche',4,'pz','uova'),i('zucchine medie',2,'pz','zucchine'),i('parmigiano',35,'g','parmigiano'),i('olio EVO',25,'ml','olio'),i('aglio',1,'pz','aglio'),i('menta fresca',3,'foglie','erbe'),i('sale e pepe',3,'g','sale')],
['Lava le zucchine e tagliale a rondelle di circa 5mm — uniformi per cuocere nello stesso tempo. Asciugale con carta assorbente.','In una padella antiaderente da 24cm scalda 25ml di olio con 1 spicchio d\'aglio schiacciato. Aggiungi le zucchine, sala leggermente e cuoci a fuoco medio 6-7 min mescolando di tanto in tanto finché sono tenere e leggermente dorate. Rimuovi l\'aglio.','In una ciotola sbatti 4 uova con 35g di parmigiano grattugiato, sale, pepe e qualche foglia di menta spezzettata (opzionale ma profumata). Sbatti bene fino a che albumi e tuorli sono completamente amalgamati.','Distribuisci le zucchine uniformemente nella padella ancora sul fuoco medio-basso. Versa il composto di uova sulle zucchine. ABBASSA la fiamma al minimo, copri con un coperchio e cuoci per 4-5 min: le uova devono rapprendersi ai bordi ma rimanere ancora cremose al centro.','GIRA LA FRITTATA: metti un piatto grande (più largo della padella) sul bordo, tieni saldamente con entrambe le mani e capovolgi in un colpo deciso. Fai scivolare la frittata dalla parte cruda nella padella. Cuoci altri 2-3 min scoperta. Deve essere dorata da entrambi i lati.'],
['Soffriggi zucchine a rondelle con olio e aglio nel boccale con farfalla: 7 min / 120°C / Vel. 1. Togli e metti in padella antiaderente.','Sbatti uova con parmigiano nel boccale: 30 sec / Vel. 4. Versa sulle zucchine in padella e cuoci tradizionalmente. Il Mambo non è adatto per cuocere le frittate.']),

r('i29','Scaloppine al Limone',RC.italiana,15,'facile','🍋',
[i('fettine di vitello',300,'g','vitello'),i('farina 00',40,'g','farina'),i('burro',50,'g','burro'),i('succo di limone',2,'pz','limone'),i('brodo di carne',80,'ml','brodo'),i('prezzemolo fresco',10,'g','prezzemolo'),i('sale e pepe',3,'g','sale')],
['Batti le fettine di vitello con un batticarne tra due fogli di carta forno fino a renderle spesse circa 5mm — la carne deve essere uniforme per cuocere in modo omogeneo.','Sala e pepa entrambi i lati. Infarina leggermente e scrolla via la farina in eccesso: deve rimanere solo uno strato sottilissimo.','In una padella larga fai sciogliere 50g di burro a fuoco medio-vivace. Quando il burro fa la schiuma (e prima che scurisca!) aggiungi le scaloppine senza sovrapporle. Cuoci 1.5-2 min per lato — devono essere dorate fuori ma ancora morbide dentro. Togli la carne e tienila al caldo coperta.','Nella stessa padella (senza pulirla) abbassa la fiamma. Aggiungi 80ml di brodo di carne mescolando con una spatola per staccare il fondo caramellato ("deglassare"). Aggiungi il succo di 2 limoni appena spremuti. Cuoci 2-3 min finché la salsa si addensa leggermente e diventa lucida.','Rimetti le scaloppine nella salsa, scalda 30 secondi, aggiungi prezzemolo tritato. Impiatta e versa la salsa al limone sopra.'],
['Scalda il boccale: aggiungi 40g burro: 1 min / 120°C / Vel. 1. Aggiungi scaloppine infarinate: cuoci 2 min per lato / 120°C / Vel. 1 con farfalla delicata o in padella (preferibile). Il Mambo può rompere le fettine sottili — meglio la padella per la carne.','Per la salsa: nel boccale aggiungi brodo + succo di limone: 3 min / 100°C / Vel. 2. Versa sulla carne scaldata in padella.']),

r('i30','Pollo al Limone',RC.italiana,30,'facile','🍗',
[i('petti di pollo',400,'g','pollo'),i('limoni non trattati',2,'pz','limone'),i('aglio',3,'pz','aglio'),i('rosmarino fresco',3,'rametti','rosmarino'),i('olio EVO',40,'ml','olio'),i('farina',20,'g','farina'),i('brodo di pollo',100,'ml','brodo'),i('burro',20,'g','burro')],
['Appiattisci leggermente i petti di pollo con il batticarne. Taglia in 2-3 pezzi per petto. Sala e pepa.','MARINATURA (opzionale ma migliore): metti il pollo in una ciotola con il succo di 1 limone, 1 spicchio d\'aglio schiacciato e rosmarino per 20 min.','Asciuga il pollo dalla marinatura con carta assorbente. Infarinalo leggermente su tutti i lati.','In una padella larga scalda 40ml di olio a fuoco medio-vivace. Aggiungi 2 spicchi d\'aglio schiacciati e il rosmarino: soffriggi 1 min per aromatizzare l\'olio. Aggiungi il pollo e cuoci 5-6 min per lato senza muoverlo — la crosticina si forma solo se la carne rimane ferma. Il pollo è cotto quando, premendo al centro, non cede elasticamente e i succhi escono trasparenti.','Togli il pollo. Nella stessa padella versa il succo del 2° limone, il brodo e la scorza grattugiata di mezzo limone. Porta a bollore e cuoci 3-4 min raschiando il fondo. Aggiungi 20g di burro fuori dal fuoco per lucidare la salsa. Rimetti il pollo, scalda 1 min. Servi con la salsa.'],
['Scalda olio + aglio + rosmarino nel boccale: 2 min / 120°C / Vel. 1. Aggiungi pollo infarinato con farfalla: 6 min / 120°C / Vel. 1. Gira a metà.','Aggiungi succo limone + brodo + scorza: 5 min / 100°C / Vel. 1. Aggiungi burro: 1 min / 80°C / Vel. 2 per lucidare.']),

r('i31','Pollo alla Cacciatora',RC.italiana,50,'media','🍗',
[i('pollo a pezzi',800,'g','pollo'),i('pomodori pelati',400,'g','pomodori'),i('cipolla',1,'pz','cipolla'),i('funghi champignon',200,'g','funghi'),i('olive verdi denocciolate',60,'g','olive'),i('vino rosso',150,'ml','vino'),i('rosmarino',2,'rametti','rosmarino'),i('aglio',3,'pz','aglio'),i('olio EVO',40,'ml','olio'),i('acciughe',2,'filetti','acciughe')],
['Asciuga molto bene i pezzi di pollo con carta assorbente — l\'umidità impedisce la doratura. Sala e pepa abbondantemente.','In una casseruola ampia scalda 40ml di olio a fuoco vivace. Rosola il pollo su tutti i lati per 4-5 min per lato finché è ben dorato (non muoverlo prima che si stacchi da solo). Togli il pollo e metti da parte.','Nella stessa casseruola abbassa la fiamma a media. Aggiungi cipolla tritata grossolana, aglio schiacciato e le acciughe (si scioglieranno nella cottura addensando il fondo). Soffriggi 5 min.','Aggiungi i funghi a fette e cuoci 4 min finché rilasciano il liquido. Sfuma con 150ml di vino rosso e lascia evaporare l\'alcol completamente (~3 min a fuoco vivace).','Aggiungi i pomodori pelati schiacciati, le olive e il rosmarino. Mescola, porta a bollore, poi abbassa. Rimetti il pollo nella casseruola: deve essere semi-immerso nel sugo. Cuoci coperto a fuoco basso per 30-35 min finché il pollo è tenero (la carne si deve staccare dall\'osso con facilità).'],
['Rosola il pollo in padella (il Mambo non rosola bene la carne intera). Togli e metti da parte.','Nel boccale: cipolla + aglio + acciughe + olio: 5 min / 120°C / Vel. 1. Aggiungi funghi: 5 min / 120°C / Vel. 1.','Sfuma vino: 2 min / Varoma / Vel. 1 senza tappo. Aggiungi pomodori + olive + rosmarino: 5 min / 100°C / Vel. 1.','Aggiungi il pollo rosolato nel boccale (o trasferisci tutto in padella): cuoci 30 min / 100°C / Vel. 1 girando il pollo a metà cottura.']),

r('i33','Melanzane alla Parmigiana',RC.italiana,60,'media','🍆',
[i('melanzane grandi',800,'g','melanzane'),i('pomodori pelati San Marzano',600,'g','pomodori'),i('mozzarella fior di latte',300,'g','mozzarella'),i('parmigiano grattugiato',80,'g','parmigiano'),i('basilico fresco',15,'foglie','basilico'),i('olio EVO',60,'ml','olio'),i('olio per friggere',400,'ml','olio'),i('aglio',2,'pz','aglio')],
['Taglia le melanzane a fette spesse 5mm nel senso della lunghezza. Mettile in uno scolapasta, sala ogni strato abbondantemente e lascia 30 min a perdere l\'acqua di vegetazione amara. Poi sciacqua e asciuga bene con carta assorbente.','SUGO: In un pentolino scalda 60ml olio con aglio. Aggiungi i pomodori pelati schiacciati con le mani, 8-10 foglie di basilico e cuoci 15-20 min a fuoco medio finché la salsa si addensa. Aggiusta di sale. Tieni da parte.','MOZZARELLA: Taglia a fette e lascia scolare su carta assorbente almeno 30 min — l\'acqua in eccesso rovinrebbe la parmigiana.','FRITTURA: Scalda abbondante olio di semi a 180°C in una padella profonda. Friggi le melanzane a gruppi di 3-4 fette per volta per 2-3 min per lato finché dorate. Scola su carta assorbente e tampona l\'olio.','ASSEMBLAGGIO: Preriscalda il forno a 180°C. In una teglia 30x25cm versa 2 cucchiai di sugo sul fondo. Primo strato di melanzane, poi sugo, mozzarella, parmigiano e basilico. Ripeti per 3-4 strati. Termina con sugo abbondante, parmigiano e basilico.','Inforna 25-30 min finché gorgoglia e la superficie è dorata. Lascia riposare 15 min prima di tagliare — è ancora migliore il giorno dopo!'],
['Il sugo: nel boccale aglio + olio: 2 min / 120°C / Vel. 1. Aggiungi pomodori + basilico: 20 min / 100°C / Vel. 1. Aggiusta sale.','Le melanzane fritte vanno preparate in padella tradizionalmente (il Mambo non è adatto per friggere). Assembla e inforna normalmente.']),

r('i35','Tiramisu',RC.italiana,30,'media','🍰',
[i('mascarpone fresco',500,'g','mascarpone'),i('uova fresche grandi',4,'pz','uova'),i('zucchero fine',100,'g','zucchero'),i('savoiardi',200,'g','savoiardi'),i('caffè espresso freddo',300,'ml','caffè'),i('marsala secco',30,'ml','marsala'),i('cacao amaro in polvere',20,'g','cacao')],
['Prepara il caffè espresso (almeno 4 tazze) e lascialo raffreddare completamente. Aggiungi 30ml di marsala. IMPORTANTE: il caffè deve essere freddo — caldo scioglie i biscotti troppo velocemente.','Separa i tuorli dagli albumi (sono 4 uova). In una ciotola capiente sbatti 4 tuorli con 100g di zucchero fine con le fruste elettriche per 5-6 min finché il composto è molto chiaro, gonfio, "nastriforme" e lo zucchero completamente sciolto. Aggiungi 500g di mascarpone e mescola con una spatola con movimenti delicati dal basso verso l\'alto finché è una crema liscia senza grumi.','Monta i 4 albumi a neve fermissima in una ciotola perfettamente pulita e asciutta (il grasso impedisce la montatura). Devono fare un picco rigido quando si alza la frusta.','Incorpora gli albumi montati nella crema di mascarpone in 3 riprese, mescolando con una spatola larga con movimenti ampi e delicati dal basso verso l\'alto per non smontarli.','ASSEMBLAGGIO: Immergi velocemente ogni savoiardo nel caffè (2 secondi per lato — non inzupparlo troppo altrimenti si sfascia). Disponi un primo strato nella teglia 25x18cm.','Copri con metà della crema al mascarpone e livella. Fai un secondo strato di savoiardi inzuppati. Copri con il resto della crema. Setaccia abbondante cacao amaro sopra.','Copri con pellicola e REFRIGERA almeno 4-6 ore, meglio tutta la notte. La crema deve rassodarsi completamente.'],
['Metti tuorli + zucchero nel boccale: 3 min / 50°C / Vel. 4 — questa temperatura pastorizza parzialmente le uova. Poi monta: 2 min / Vel. 4 senza calore finché gonfio e chiaro.','Aggiungi il mascarpone a temperatura ambiente: 30 sec / Vel. 3. Trasferisci in ciotola.','Monta gli albumi nel boccale pulitissimo con la farfalla: 3 min / Vel. 4 senza calore. Incorpora delicatamente a mano.','Assembla e refrigera normalmente.']),

r('i37','Salmone al Forno',RC.italiana,25,'facile','🐟',
[i('filetti di salmone con pelle',400,'g','salmone'),i('limone non trattato',1,'pz','limone'),i('olio EVO',30,'ml','olio'),i('erbe miste (timo, rosmarino, prezzemolo)',10,'g','erbe'),i('aglio',2,'pz','aglio'),i('capperi',10,'g','capperi'),i('sale e pepe',3,'g','sale')],
['Preriscalda il forno a 200°C (non ventilato). Asciuga i filetti di salmone con carta assorbente.','Prepara la marinatura: in una ciotola mescola 30ml olio EVO, il succo di mezzo limone, la scorza grattugiata di mezzo limone, aglio schiacciato, erbe aromatiche tritate, sale e pepe. Mescola bene.','Disponi i filetti di salmone (con la pelle in basso) in una teglia foderata con carta forno. Cospargi la marinatura sopra e sui lati. Aggiungi i capperi. Lascia marinare 10 min.','Inforna a 200°C: per filetti spessi 2cm calcola 10-12 min. Il salmone è pronto quando la polpa al centro è diventata opaca (non più traslucida) ma è ancora leggermente umida. NON sovracuocerlo — il centro può rimanere leggermente rosato.','Servi con fette di limone, qualche goccia di olio e un\'insalata verde.'],
['Prepara la marinatura tradizionalmente in una ciotola.','Per una cottura al vapore: metti il salmone nel Varoma con le erbe. Versa 500ml di acqua + succo di limone nel boccale. Cuoci 20 min / Varoma / Vel. 1. Il salmone resta morbidissimo e molto più leggero rispetto alla versione al forno.']),

r('i39','Spezzatino di Manzo',RC.italiana,90,'media','🥩',
[i('manzo da spezzatino (cappello del prete)',600,'g','manzo'),i('carote grandi',2,'pz','carota'),i('cipolla dorata',1,'pz','cipolla'),i('sedano',2,'coste','sedano'),i('pomodori pelati',300,'g','pomodori'),i('vino rosso robusto',150,'ml','vino'),i('brodo di carne',300,'ml','brodo'),i('patate',2,'pz','patate'),i('olio EVO',40,'ml','olio'),i('rosmarino',2,'rametti','rosmarino'),i('alloro',2,'foglie','alloro')],
['Taglia il manzo a bocconi di 4-5 cm. Asciugali benissimo con carta assorbente — l\'umidità impedisce la rosolatura. Sala e pepa abbondantemente.','ROSOLATURA: In una casseruola dal fondo spesso scalda 40ml di olio a fuoco VIVACE. Lavora in piccoli lotti (non sovrapporre la carne nella pentola): rosola i bocconi 2-3 min per lato senza muoverli — deve formarsi una crosticina bruna. Questo passaggio (reazione di Maillard) è fondamentale per il sapore finale. Togli la carne rosolata e metti da parte.','Nella stessa casseruola abbassa la fiamma a media. Aggiungi cipolla tritata grossolana, carote e sedano a pezzi. Soffriggi 5-6 min raschiando il fondo per staccare i succhi caramellati (quelli danno sapore!).','Aggiungi rosmarino e alloro. Rimetti la carne. Alza la fiamma, sfuma con 150ml di vino rosso robusto (Barolo, Chianti) e lascia evaporare completamente l\'alcol (~4 min).','Aggiungi pomodori pelati schiacciati e 300ml di brodo caldo. Porta a bollore, poi abbassa la fiamma al minimo — la superficie deve "fremere" appena. Cuoci coperto per 60-70 min.','A metà cottura aggiungi le patate sbucciate e tagliate a dadoni. Cuoci altri 25-30 min. Lo spezzatino è pronto quando la carne si spezza facilmente con il cucchiaio e le patate sono morbide. Se il sugo è troppo liquido, alza la fiamma e cuoci scoperto 10 min.'],
['Rosola la carne in padella (il Mambo non raggiunge temperature sufficienti per la vera rosolatura). Trasferisci nel boccale.','Nel boccale soffriggi verdure tritate grossolane: 5 min / 120°C / Vel. 1. Aggiungi carne rosolata, vino (sfuma 2 min / Varoma / Vel. 1 senza tappo), pomodori, brodo, aromi: 60 min / 100°C / Vel. 1. La farfalla non è necessaria — le verdure si romperanno naturalmente.','Aggiungi patate a dadoni: 25 min / 100°C / Vel. 1. Aggiusta di sale.']),

// ===== EUROPEE =====
r('e1','Boeuf Bourguignon',RC.eu,120,'difficile','🥩',
[i('manzo da brasato',600,'g','manzo'),i('vino rosso Borgogna',400,'ml','vino'),i('cipollotti borettane',150,'g','cipolla'),i('funghi champignon',200,'g','funghi'),i('pancetta affumicata a cubetti',100,'g','pancetta'),i('carota',2,'pz','carota'),i('brodo di manzo',200,'ml','brodo'),i('burro',40,'g','burro'),i('farina',25,'g','farina'),i('bouquet garni (timo, alloro, prezzemolo)',1,'pz','erbe')],
['Taglia il manzo a cubi di 4cm, marinali in 400ml di vino rosso con le carote a rondelle e il bouquet garni almeno 4 ore (meglio tutta la notte). Scola e asciuga la carne, tieni la marinatura.','Rosola la pancetta in una casseruola ghisa con poco burro finché croccante. Togli. Nello stesso grasso rosola i bocconi di manzo asciutti a fuoco vivace su tutti i lati. Togli la carne.','Soffriggi le carote della marinatura. Rimetti carne e pancetta. Cospargi con la farina e mescola 2 min per tostarla. Aggiungi la marinatura filtrata, il brodo e il bouquet garni.','Porta a bollore, copri e inforna a 160°C per 90 min.','In una padella soffriggi i cipollotti nel burro fino a dorarli. Aggiungi i funghi tagliati a quarti, cuoci 5 min. Aggiungili alla casseruola negli ultimi 20 min di cottura.','Servi con purè di patate o pane rustico.'],
['Rosola la carne e pancetta in padella antiaderente — il Mambo non raggiunge temperature sufficienti. Trasferisci nel boccale con le verdure, vino, brodo e aromi: 80 min / 100°C / Vel. 1 con farfalla.','Soffriggi cipollotti e funghi separatamente in padella, aggiungi al boccale negli ultimi 20 min.']),

r('e2','Paella Valenciana',RC.eu,45,'media','🥘',
[i('riso bomba o carnaroli',200,'g','riso'),i('pollo a pezzi',350,'g','pollo'),i('chorizo',100,'g','salumi'),i('peperoni rossi e gialli',150,'g','peperoni'),i('pomodori maturi',150,'g','pomodori'),i('paprika dolce',8,'g','paprika'),i('paprika affumicata',3,'g','paprika'),i('zafferano',0.3,'g','zafferano'),i('brodo di pollo',500,'ml','brodo'),i('olio EVO',50,'ml','olio'),i('aglio',3,'pz','aglio'),i('prezzemolo',10,'g','prezzemolo')],
['Metti lo zafferano in 2 cucchiai di brodo caldo in infusione 15 min. Scalda il brodo a parte.','In una paellera (o padella larga antiaderente) da 30cm scalda 50ml di olio a fuoco vivace. Rosola il pollo a pezzi 4-5 min per lato finché dorato. Aggiungi il chorizo a rondelle, cuoci 2 min. Togli tutto.','Nella stessa padella abbassa a fuoco medio. Soffriggi aglio e cipolla tritati 4 min. Aggiungi peperoni tagliati a striscioline e cuoci 5 min.','Aggiungi i pomodori grattugiati (grattugiali su una grattugia a maglie larghe — solo la polpa, senza pelle). Aggiungi paprika dolce e affumicata, mescola e cuoci 3 min.','Aggiungi il riso e tostalo 2 min mescolando. Versa TUTTO il brodo caldo (con lo zafferano) in una volta sola. Distribuisci uniformemente il riso. Rimetti il pollo e il chorizo. NON mescolare più da questo punto.','Cuoci a fuoco medio-vivace 10 min finché il brodo è quasi assorbito, poi abbassa a fuoco basso altri 8-10 min. Il riso deve essere tenero ma con una crosticina dorata sul fondo ("socarrat"). Per controllare: scuoti delicatamente la padella, se il riso "scivola" non c\'è socarrat — alza la fiamma 1-2 min.','Copri con carta stagnola e lascia riposare 5 min. Servi con prezzemolo e limone.'],
['La paella NON si prepara nel Mambo — richiede una padella larga e la formazione del socarrat (crosticina) che è impossibile nel boccale. Prepara tutto in padella larga tradizionalmente.']),

r('e4','Wiener Schnitzel',RC.eu,20,'facile','🥩',
[i('fettine di vitello (noce)',400,'g','vitello'),i('farina 00',60,'g','farina'),i('uova',2,'pz','uova'),i('pangrattato fine',100,'g','pangrattato'),i('burro chiarificato',100,'g','burro'),i('limone',2,'pz','limone'),i('sale e pepe',3,'g','sale')],
['Metti ogni fettina di vitello tra due fogli di pellicola trasparente. Con il batticarne (lato piatto, non dentato) batti fino a ottenere uno spessore di 3-4mm. La carne deve essere MOLTO sottile e uniforme — è la caratteristica dello schnitzel viennese.','Prepara la panatura in 3 piatti: 1° con farina, 2° con 2 uova sbattute leggermente salate, 3° con pangrattato fine. Passa ogni fettina nell\'ordine: prima farina (scrolla l\'eccesso), poi uovo (lascia che goccioli un po\'), poi pangrattato. NON premere il pangrattato — deve rimanere "libero" per creare la caratteristica panatura gonfiolata.','In una padella larga scalda 100g di burro chiarificato a fuoco medio (130-140°C — non deve fumare). Il burro chiarificato ha un punto di fumo più alto del burro normale ed è tradizionalmente usato per lo schnitzel.','Cuoci le cotolette 2-3 min per lato finché sono dorate uniformemente. La panatura deve essere croccante ma non scura. Durante la cottura, inclina la padella e irrorai la superficie con il burro caldo con un cucchiaio.','Scola su carta assorbente, sala leggermente. Servi immediatamente con fette di limone, mirtilli rossi (lingonberries) e insalata di cetrioli.'],
['Lo schnitzel si prepara esclusivamente in padella — il Mambo non è adatto per questa preparazione.']),

r('e7','Tortilla Española',RC.eu,30,'media','🥚',
[i('patate a pasta gialla',500,'g','patate'),i('uova fresche grandi',6,'pz','uova'),i('cipolla bianca',1,'pz','cipolla'),i('olio EVO',120,'ml','olio'),i('sale fino',8,'g','sale')],
['Pela le patate e tagliale a fette sottilissime (2-3mm) con una mandolina o coltello affilato. Taglia la cipolla a fette sottili. MESCOLA patate e cipolla e sala abbondantemente.','In una padella antiaderente da 22cm versa 120ml di olio EVO. Aggiungi patate e cipolla: devono essere quasi sommerse nell\'olio. Cuoci a fuoco medio-basso per 15-20 min mescolando spesso — le patate devono AMMORBIDIRSI ma non friggere. Devono rimanere pallide, non dorate. Scola dalla padella con una schiumarola conservando l\'olio.','In una ciotola capiente sbatti 6 uova con sale fino a che sono ben amalgamate. Aggiungi le patate e cipolla scolate e mescola delicatamente. Lascia riposare 5 min.','Nella padella (con 2 cucchiai dell\'olio di cottura) versa il composto uova-patate a fuoco medio. Con una spatola gira i bordi verso l\'interno e scuoti la padella. Cuoci 3-4 min finché i bordi si rassodano ma il centro è ancora tremolante.','GIRO: metti un piatto grande e piatto sopra la padella. In un movimento deciso, capovolgi tenendo la padella col pollice sopra il piatto. La tortilla è sul piatto. Fai scivolare nella padella dalla parte cruda. Cuoci altri 2-3 min. Al centro deve rimanere cremosa.'],
['Metti patate + cipolla + olio nel boccale: 20 min / 100°C / Vel. 1 con farfalla. Scola.','Sbatti le uova nel boccale: 20 sec / Vel. 4. Mescola con le patate a mano. Cuoci la tortilla in padella tradizionalmente — il Mambo non è adatto per capovolgerla.']),

// ===== GIAPPONESI =====
r('j1','Ramen Tonkotsu',RC.jp,60,'media','🍜',
[i('noodles ramen freschi',200,'g','ramen'),i('pancia di maiale (chashu)',200,'g','pancetta'),i('uova',2,'pz','uova'),i('brodo di ossa di maiale',900,'ml','brodo'),i('pasta di miso bianco',30,'g','miso'),i('salsa di soia',30,'ml','soia'),i('mirin',15,'ml','mirin'),i('aglio',2,'pz','aglio'),i('zenzero fresco',15,'g','zenzero'),i('olio di sesamo',10,'ml','sesamo'),i('cipollotto',3,'pz','cipollotto'),i('nori (alga)',2,'fogli','nori'),i('mais dolce',60,'g','mais')],
['UOVA MARINATE (il giorno prima): cuoci le uova in acqua bollente esatti 7 minuti. Raffredda in acqua ghiacciata. Sguscia con cura. Metti in un sacchetto con 50ml soia + 50ml mirin + 100ml acqua. Mariana in frigo 8-12 ore: diventeranno di un bel marrone ambrato con tuorlo cremoso.','CHASHU: Marina la pancia di maiale arrotolata e legata in 50ml soia + 30ml mirin + 1 cucchiaino di zucchero per 2 ore. In una padella rosola su tutti i lati a fuoco vivace. Trasferisci in una pentola con la marinatura + 200ml acqua. Cuoci coperto a fuoco basso 45 min. Lascia raffreddare nella sua salsa, poi taglia a fette spesse.','TARE (base sapore): in un pentolino mescola 30ml soia + 15ml mirin + 10ml sake. Scalda 2 min a fuoco basso. Tieni da parte.','BRODO: Scalda 900ml di brodo di ossa. Aggiungi aglio e zenzero grattugiati. Porta quasi a bollore.','ASSEMBLAGGIO: dissolvi 30g di miso nel brodo caldo (mai bollire il miso — distrugge gli enzimi benefici). Aggiungi 2 cucchiai di tare.','Cuoci i noodles in acqua bollente non salata il tempo indicato. Scola e metti nella ciotola. Versa il brodo caldissimo.','Guarnisci con: 2-3 fette di chashu, metà uova marinata tagliata, cipollotto a rondelle, foglio di nori piegato sul bordo, mais, olio di sesamo. Servi immediatamente.'],
['BRODO nel Mambo: metti brodo, aglio e zenzero grattugiati nel boccale: 10 min / 90°C / Vel. 1 (non bollire il miso!). Dissolvi il miso in 2 mestoli di brodo tiepido a parte, poi riaggiungilo.','Il chashu si prepara in padella/pentola tradizionalmente. I noodles si cuociono in pentola normale.']),

r('j2','Gyoza',RC.jp,40,'media','🥟',
[i('pasta per gyoza (dischetti pronti)',24,'pz','gyoza'),i('macinato di maiale',200,'g','maiale'),i('cavolo cinese (napa cabbage)',150,'g','cavolo'),i('zenzero fresco grattugiato',15,'g','zenzero'),i('aglio',2,'pz','aglio'),i('salsa di soia',25,'ml','soia'),i('olio di sesamo',15,'ml','sesamo'),i('cipollotto',2,'pz','cipollotto'),i('olio di girasole',20,'ml','olio')],
['RIPIENO: Trita finemente il cavolo, poi mettilo in un colino, sala e lascia 10 min. Strizza fortemente con le mani per eliminare tutta l\'acqua (passaggio fondamentale — il ripieno troppo bagnato fa rompere i gyoza). Mescola 200g di macinato di maiale + cavolo strizzato + zenzero grattugiato + aglio grattugiato + 25ml soia + 15ml sesamo + cipollotto tritato finissimo. Mescola vigorosamente in un\'unica direzione per 2 min: il ripieno deve diventare appiccicoso e "legato".','FORMATURA: Bagna il bordo di un dischetto con acqua. Metti 1 cucchiaino colmo di ripieno al centro (non esagerare). Piega a mezzaluna e pizzica il bordo superiore facendo 4-5 pieghe sul lato anteriore verso quello posteriore liscio — le pieghe creano la caratteristica forma. Tieni i gyoza dritti, pronti per la cottura.','COTTURA (metodo gyoza): In una padella antiaderente (con coperchio) scalda 20ml di olio a fuoco medio-vivace. Disponi i gyoza sulla parte piatta, ben ravvicinati ma senza toccarsi. Cuoci 2-3 min finché il fondo è dorato.','VAPORE: Aggiungi 80ml di acqua nella padella e COPRI IMMEDIATAMENTE (attenzione agli schizzi). Cuoci a vapore coperto 5-6 min finché tutta l\'acqua evapora. Togli il coperchio e cuoci altri 30 secondi per rendere croccante di nuovo il fondo.','SALSA DIPPING: mescola 30ml soia + 20ml aceto di riso + qualche goccia di olio di sesamo + peperoncino fresco a rondelle. Servi a parte.'],
['Prepara il ripieno nel boccale: metti cavolo a pezzi + zenzero + aglio: 5 sec / Vel. 7. Togli, strizza bene.','Aggiungi macinato + verdure + condimenti nel boccale: 30 sec / Vel. 3 con farfalla per amalgamare. Non tritare — il ripieno deve avere consistenza.','Forma i gyoza a mano. Cuoci in padella tradizionalmente (il vapore-friggere non si può replicare nel Mambo).']),

r('j3','Teriyaki di Pollo',RC.jp,25,'facile','🍗',
[i('cosce di pollo disossate con pelle',400,'g','pollo'),i('salsa di soia',50,'ml','soia'),i('mirin',40,'ml','mirin'),i('sake',30,'ml','sake'),i('zucchero di canna',15,'g','zucchero'),i('zenzero fresco',10,'g','zenzero'),i('olio di sesamo',10,'ml','sesamo'),i('riso japonicum',200,'g','riso'),i('semi di sesamo bianchi',5,'g','sesamo')],
['SALSA TERIYAKI: in una ciotola mescola 50ml soia + 40ml mirin + 30ml sake + 15g zucchero di canna + zenzero grattugiato. Mescola fino a sciogliere lo zucchero.','Taglia le cosce di pollo in 2-3 pezzi. Metti nel sacchetto con la salsa teriyaki e marina 30 min (o fino a 4 ore in frigo).','Cuoci il riso giapponese: sciacqualo più volte fino ad acqua limpida. Copri con acqua fredda in volume 1:1.2 (es. 200g riso = 240ml acqua). Porta a bollore, abbassa al minimo, cuoci coperto esatti 12 min. Togli dal fuoco e lascia riposare 10 min con coperchio — non aprire!','Togli il pollo dalla marinatura asciugandolo leggermente con carta assorbente (tieni la marinatura). In una padella antiaderente scalda olio di sesamo a fuoco medio-vivace. Cuoci il pollo con la PELLE IN GIÙ per 5-6 min senza muoverlo — la pelle deve diventare dorata e croccante. Gira e cuoci altri 4-5 min.','Versa la marinatura nella padella e alza la fiamma a vivace: cuoci 3-4 min finché la salsa si riduce, addensa e diventa una glassa lucida che caramella il pollo. Giralo per ricoprirlo completamente. La glassa è pronta quando "tira" con il cucchiaio.','Affetta il pollo in diagonale. Servi sul riso con la glassa, semi di sesamo tostati e cipollotto affettato.'],
['RISO nel Mambo: metti riso sciacquato + 250ml acqua nel boccale: 14 min / 100°C / Vel. 1. Riposa 5 min coperto.','SALSA TERIYAKI nel boccale: tutti gli ingredienti della salsa: 5 min / 100°C / Vel. 2 fino ad addensare.','POLLO: cuoci in padella tradizionalmente per ottenere la crosticina croccante. Il Mambo non è adatto per caramellare la glassa sulla carne.']),

r('j4','Tonkatsu',RC.jp,25,'facile','🍱',
[i('braciole di maiale (lombata)',350,'g','maiale'),i('panko (pangrattato giapponese)',100,'g','pangrattato'),i('farina 00',50,'g','farina'),i('uova',2,'pz','uova'),i('olio per friggere',400,'ml','olio'),i('cavolo cappuccio',150,'g','cavolo'),i('salsa tonkatsu o worcestershire',40,'ml','soia'),i('senape giapponese',10,'g','senape')],
['Rimuovi il tessuto connettivo bianco dai bordi della carne (si contrae durante la cottura deformando le fettine). Con un coltello fai piccole incisioni lungo i bordi. Batti le braciole a circa 1.5-2cm di spessore — non troppo sottili per il tonkatsu.','Sala e pepa. Prepara la panatura in sequenza: 1° piatto farina, 2° uova sbattute, 3° panko abbondante. Premi bene il panko su tutti i lati — deve aderire uniformemente. Il panko è fondamentale: più grossolano del pangrattato italiano, crea una panatura più croccante e leggera.','Scalda 400ml di olio di arachidi o girasole in una padella profonda a 170°C (usa un termometro — la temperatura precisa è importante). Testa: se immergi un bastoncino di legno, deve fare bollicine attive.','Friggi le braciole 4-5 min per lato. La panatura deve diventare dorata uniforme e croccante. Scola su carta assorbente. Taglia a fette spesse 1.5cm con un coltello affilato senza "segare" (schiaccia verso il basso).','CONDIMENTO: Taglia finissimamente il cavolo (la mandolina aiuta). Metti in acqua ghiacciata 5 min per renderlo croccante. Scola e asciuga. Servi il tonkatsu con cavolo, salsa tonkatsu (mescola 30ml worcestershire + 10ml ketchup + 5ml soia), senape e riso.'],
['Il Tonkatsu si prepara esclusivamente friggendo in padella — il Mambo non è adatto per friggere la carne impanata.']),

r('j5','Miso Soup',RC.jp,10,'facile','🍵',
[i('brodo dashi (granulare o fatto in casa)',700,'ml','brodo'),i('pasta di miso rosso o bianco',50,'g','miso'),i('tofu silken (morbido)',150,'g','tofu'),i('alga wakame essiccata',8,'g','nori'),i('cipollotto',2,'pz','cipollotto'),i('olio di sesamo',3,'ml','sesamo')],
['DASHI: se usi il granulare, sciogli 1 cucchiaino in 700ml di acqua. Se fatto in casa: porta a bollore 700ml acqua con 10g di alga kombu. Prima del bollore togli il kombu, aggiungi 15g di fiocchi di katsuobushi, lascia riposare 5 min, filtra.','Reidrata il wakame: mettilo in acqua fredda 5-10 min. Si espanderà 5x. Scola e strizza delicatamente.','Taglia il tofu silken a dadini di 1.5cm con molta delicatezza — è fragile. Non mescolare aggressivamente una volta in pentola.','Scalda il dashi a fuoco medio finché è quasi bollente (non deve bollire dopo che aggiungi il miso — il calore eccessivo distrugge gli enzimi e altera il sapore). Aggiungi il wakame e il tofu, scalda 2-3 min.','Sciogli il miso in una piccola ciotola con 3-4 cucchiai di brodo caldo prima di aggiungerlo — evita grumi. Versalo nel brodo mescolando delicatamente. Spegni immediatamente la fiamma. Il miso NON deve bollire.','Distribuisci nelle ciotole. Aggiungi cipollotto a rondelle sottili e qualche goccia di olio di sesamo. Servi subito.'],
['Nel boccale metti dashi + wakame + tofu: 5 min / 80°C / Vel. 1 (la temperatura bassa preserva i sapori delicati).','Scioglie il miso in un mestolo con un po\' di brodo caldo, poi versalo nel boccale: 1 min / 70°C / Vel. 1. Non superare 80°C per preservare il miso.','Servi immediatamente con cipollotto e olio di sesamo.']),

r('j6','Chirashi Sushi',RC.jp,30,'media','🍱',
[i('riso per sushi (japonica)',200,'g','riso'),i('salmone freschissimo (sushi grade)',150,'g','salmone'),i('tonno freschissimo (sushi grade)',100,'g','tonno'),i('gamberi cotti',80,'g','gamberi'),i('aceto di riso',35,'ml','aceto'),i('zucchero',15,'g','zucchero'),i('sale fino',5,'g','sale'),i('wasabi',8,'g','wasabi'),i('salsa di soia',30,'ml','soia'),i('nori (alga)',2,'fogli','nori'),i('semi di sesamo',5,'g','sesamo'),i('cetriolo',1,'pz','cetriolo')],
