['RISO SUSHI: sciacqua il riso più volte finché l\'acqua è limpida. Metti in pentola con 240ml acqua fredda. Porta a bollore, abbassa al minimo, cuoci ESATTI 12 min coperto. Togli dal fuoco, riposa 10 min senza aprire.','CONDIMENTO RISO: in un pentolino scalda 35ml aceto di riso + 15g zucchero + 5g sale finché si scioglie (non bollire). Versa il riso caldo in una ciotola larga di legno (hangiri). Versaci sopra il condimento e mescola con una spatola in legno con movimenti orizzontali "a taglio" mentre lo eventi con un ventaglio. NON girare — si spiaccica. Il riso deve diventare lucido, leggermente appiccicoso e a temperatura ambiente.','PESCE: usa solo pesce sashimi-grade (garantito per il consumo crudo). Taglia il salmone e il tonno a fette spesse 8mm, leggermente in diagonale rispetto alla fibra — tagliate più sottili se preferisci.','Taglia il cetriolo a julienne fine o a rondelle sottilissime.','ASSEMBLAGGIO: Metti il riso nelle ciotole individuali (una bella porzione compressa leggermente). Disponi il pesce, i gamberi, il cetriolo e il nori tagliato a striscioline in modo decorativo (come un mosaico colorato). Aggiungi sesamo tostato, una pallina di wasabi sul bordo. Servi con la soia in una ciotolina a parte.'],
['RISO nel Mambo: riso sciacquato + 250ml acqua: 14 min / 100°C / Vel. 1. Trasferisci in ciotola e condisci come sopra.','Il condimento e il pesce si preparano tradizionalmente a mano.']),

r('j8','Karaage (Pollo Fritto Giapponese)',RC.jp,30,'facile','🍗',
[i('cosce di pollo disossate',400,'g','pollo'),i('salsa di soia',35,'ml','soia'),i('sake',25,'ml','sake'),i('zenzero fresco grattugiato',15,'g','zenzero'),i('aglio grattugiato',2,'pz','aglio'),i('maizena',50,'g','maizena'),i('olio per friggere',500,'ml','olio'),i('maionese kewpie (giapponese)',40,'g','maionese'),i('limone',1,'pz','limone')],
['Taglia il pollo in bocconi irregolari di 3-4cm — non uniformi è tipico del karaage giapponese. Lascia la pelle se presente.','MARINATURA: in una ciotola mescola 35ml soia + 25ml sake + zenzero grattugiato + aglio grattugiato. Aggiungi il pollo e massaggia bene. Copri e marina in frigo 20-30 min (non di più — la soia inizia a cuocere la carne).','Togli il pollo dalla marinatura e asciugalo leggermente (non troppo — un po\' di umidità aiuta la maizena ad aderire). Metti 50g di maizena in un sacchetto, aggiungi il pollo e agita per ricoprire uniformemente. Scrolla via l\'eccesso: deve esserci uno strato sottile e uniforme.','PRIMA FRITURA: scalda l\'olio a 170°C. Friggi i bocconi in piccoli lotti (non sovraffollare — abbassa la temperatura dell\'olio) per 4 min. Scola su carta assorbente. Lascia riposare 3 min.','SECONDA FRITURA (il segreto del karaage croccante): scalda l\'olio a 190°C. Rifriggi gli stessi bocconi per 1-2 min finché diventano dorati e croccantissimi. La doppia fritura elimina l\'umidità residua e crea una crosta impenetrabile.','Servi immediatamente con maionese kewpie, fette di limone, cavolo tagliato fine e birra ghiacciata.'],
['Marina il pollo tradizionalmente. La cottura deve avvenire in padella/wok con olio abbondante — il Mambo non è adatto per friggere. Per un\'alternativa più leggera: metti i bocconi marinati (senza maizena) nel Varoma e cuoci a vapore: 20 min / Varoma / Vel. 1. Il risultato sarà più morbido ma senza la croccantezza tipica.']),

r('j9','Tempura di Gamberi e Verdure',RC.jp,25,'media','🍤',
[i('gamberi grandi (16-20)',200,'g','gamberi'),i('zucchine',1,'pz','zucchine'),i('funghi shiitake',4,'pz','funghi'),i('farina 00 ghiacciata',80,'g','farina'),i('fecola di patate',20,'g','maizena'),i('uovo',1,'pz','uova'),i('acqua ghiacciata gassata',160,'ml','acqua'),i('olio di semi di arachidi',600,'ml','olio'),i('dashi',300,'ml','brodo'),i('mirin',30,'ml','mirin'),i('soia',30,'ml','soia'),i('daikon grattugiato',30,'g','verdure')],
['SALSA TENTSUYU: in un pentolino scalda 300ml dashi + 30ml mirin + 30ml soia. Porta quasi a bollore, poi togli dal fuoco. Servi tiepida con daikon grattugiato dentro.','GAMBERI: rimuovi il guscio lasciando la codina. Con uno stuzzicadenti rimuovi il filo nero intestinale. Fai 4-5 incisioni superficiali sul ventre (impedisce che si arriccino in cottura). Asciuga benissimo.','PASTELLA (preparala all\'ultimo momento, FREDDA): mescola molto brevemente 80g farina + 20g fecola + 1 uovo + 160ml acqua gassata ghiacciata. Usa una forchetta con pochi colpi — DEVE rimanere grumosa! I grumi sono il segreto della tempura leggera e croccante. Tieni la ciotola su ghiaccio.','Scalda l\'olio a 180°C. IMPORTANTE: la pastella fredda + olio caldo = croccantezza istantanea.','Immergi gamberi e verdure nella pastella e friggi immediatamente per 2-3 min. Il colore deve essere bianco-dorato pallido, non dorato scuro. Scola su carta assorbente. Mangia immediatamente — la tempura perde la croccantezza in pochi minuti.'],
['La tempura richiede frittura in abbondante olio caldo — il Mambo non è adatto. Puoi preparare la salsa tentsuyu nel Mambo: dashi + mirin + soia: 3 min / 80°C / Vel. 2.']),

r('j10','Onigiri al Tonno',RC.jp,20,'facile','🍙',
[i('riso per sushi',200,'g','riso'),i('tonno in scatola all\'olio',80,'g','tonno'),i('maionese kewpie',25,'g','maionese'),i('salsa di soia',5,'ml','soia'),i('nori in fogli',2,'fogli','nori'),i('sale fino',4,'g','sale'),i('semi di sesamo',5,'g','sesamo')],
['Cuoci il riso come per il sushi (sciacqua, 200g riso + 240ml acqua, 12 min coperto + 10 min riposo). Non condire con aceto — gli onigiri si fanno con riso bianco leggermente salato.','RIPIENO: scola il tonno dall\'olio. Mescola 80g tonno + 25g maionese kewpie + 5ml soia + eventualmente un pizzico di pepe bianco.','Prepara una ciotolina con acqua salata per bagnare le mani (impedisce che il riso attacchi). Bagna bene le palme e cospargile di poco sale.','Prendi una porzione di riso (~100g) sul palmo. Fai un\'impronta al centro, metti 1 cucchiaio abbondante di ripieno. Richiudi il riso sopra il ripieno. Forma un triangolo: con entrambe le mani a "V" comprimi delicatamente il riso modellando i 3 lati del triangolo. La pressione deve essere decisa ma non eccessiva — il riso deve compattarsi senza diventare una palla dura.','Ritaglia il nori in strisce di ~4cm di larghezza. Avvolgi la base dell\'onigiri col nori (il nori deve rimanere croccante: avvolgi all\'ultimo momento prima di mangiare, oppure insegna che l\'onigiri classico porta il nori a contatto del riso solo al momento del consumo).','Cospargere con semi di sesamo tostati.'],
['RISO nel Mambo: riso sciacquato + 250ml acqua: 14 min / 100°C / Vel. 1. Riposa 5 min coperchiato.','Prepara ripieno e forma gli onigiri tradizionalmente a mano — è un processo manuale che richiede sensibilità.']),

r('j12','Oyakodon',RC.jp,20,'facile','🍱',
[i('petto di pollo',200,'g','pollo'),i('uova fresche',3,'pz','uova'),i('cipolla dorata',1,'pz','cipolla'),i('brodo dashi',200,'ml','brodo'),i('salsa di soia',40,'ml','soia'),i('mirin',30,'ml','mirin'),i('sake',20,'ml','sake'),i('zucchero',5,'g','zucchero'),i('riso giapponese',200,'g','riso'),i('cipollotto',1,'pz','cipollotto')],
['Cuoci il riso giapponese: sciacqua, copri con acqua 1:1.2, 12 min + 10 min riposo.','Taglia il pollo in bocconi di 2-3cm. Taglia la cipolla a mezzalune spesse.','TSUYU (brodo di cottura): mescola 200ml dashi + 40ml soia + 30ml mirin + 20ml sake + 5g zucchero. Porta a bollore in una padella piccola (o donburi pan 20cm).','Aggiungi cipolla nel tsuyu bollente e cuoci 3-4 min a fuoco medio finché inizia ad ammorbidire. Aggiungi il pollo distribuito uniformemente. Cuoci 4-5 min finché il pollo è cotto (non più rosa).','Sbatti le uova LEGGERMENTE — non devono essere completamente amalgamate, ci devono essere striature di albume e tuorlo separate.','Versa le uova a spirale sul pollo e la cipolla — prima il bordo esterno poi il centro. Copri con il coperchio. Cuoci 30-60 secondi: le uova devono essere ancora CREME, leggermente rapprese in superficie ma fluide al centro. Il calore residuo le finirà di cuocere.','Trasferisci delicatamente sul riso nella ciotola. Guarnisci con cipollotto a rondelle sottili.'],
['RISO nel Mambo: 14 min / 100°C / Vel. 1 con acqua.','TSUYU nel boccale: brodo + condimenti: 3 min / 100°C / Vel. 1. Aggiungi cipolla + pollo: 6 min / 100°C / Vel. 1 con farfalla.','Trasferisci in padella. Aggiungi le uova sbattute a spirale e copri 1 min — il Mambo non permette il controllo visivo necessario per l\'uovo cremoso tipico dell\'oyakodon.']),

// ===== CINESI =====
r('c1','Riso alla Cantonese',RC.cn,20,'facile','🍚',
[i('riso cotto freddo del giorno prima',400,'g','riso'),i('uova',3,'pz','uova'),i('piselli surgelati',80,'g','piselli'),i('prosciutto cotto',100,'g','prosciutto'),i('cipollotto',3,'pz','cipollotto'),i('salsa di soia',25,'ml','soia'),i('olio di sesamo',10,'ml','sesamo'),i('olio di girasole',30,'ml','olio'),i('sale e pepe bianco',3,'g','sale')],
['USA RISO FREDDO: il riso del giorno prima (refrigerato) è essenziale. Il riso appena cotto ha troppa umidità e si incolla nel wok. Se devi cucinarlo oggi, stendilo su una teglia e mettilo in frigo 1-2 ore.','Separa i chicchi del riso freddo con le mani per togliere i grumi. Taglia prosciutto a dadini piccoli. Taglia cipollotto separando il verde (decorazione) dal bianco (cottura).','UOVA: in una ciotola sbatti le 3 uova con un pizzico di sale. Scalda un wok o padella antiaderente a fuoco VIVACISSIMO finché fuma leggermente. Aggiungi 15ml di olio, versa le uova e strapazzale velocemente con la spatola a pezzi irregolari — devono rimanere morbide e umide (30-45 sec). Togli e metti da parte.','Aggiungi altri 15ml di olio nel wok rovente. Aggiungi il bianco del cipollotto e i piselli scongelati. Salta 1-2 min a fuoco vivace.','Aggiungi il riso freddo: distribuiscilo uniformemente nel wok e lascialo bruciucchiare 30 sec senza muoverlo (crea quel sapore "affumicato" da wok, detto wok hei). Poi mescola energicamente con la spatola schiacciando i grumi.','Aggiungi il prosciutto e le uova strapazzate. Versa 25ml soia sui bordi del wok (non al centro — la soia evaporerà istantaneamente) e mescola rapidamente. Aggiungi olio di sesamo e pepe bianco. Salta 1-2 min finché tutto è ben amalgamato.','Servi decorando con il verde del cipollotto.'],
['Trita cipollotto bianco nel boccale: 3 sec / Vel. 5. Con 30ml olio: 2 min / 120°C / Vel. 1.','Aggiungi piselli + prosciutto + riso freddo: 5 min / 120°C / Vel. 1 con farfalla.','Sbatti le uova a parte in padella, aggiungile al boccale con soia e sesamo: 2 min / 100°C / Vel. 1. Attenzione: il Mambo non raggiunge la temperatura del wok — il riso sarà buono ma mancherà il "wok hei" tipico del piatto.']),

r('c2','Kung Pao Pollo',RC.cn,25,'media','🌶️',
[i('petto di pollo',350,'g','pollo'),i('arachidi tostate',70,'g','arachidi'),i('peperoncino secco cinese',5,'pz','peperoncino'),i('pepe del Sichuan',1,'g','pepe'),i('aglio',3,'pz','aglio'),i('zenzero fresco',15,'g','zenzero'),i('cipollotto',2,'pz','cipollotto'),i('salsa di soia',30,'ml','soia'),i('aceto di riso nero (chinkiang)',15,'ml','aceto'),i('zucchero di canna',10,'g','zucchero'),i('maizena',15,'g','maizena'),i('olio di sesamo',10,'ml','sesamo'),i('olio di girasole',30,'ml','olio')],
['MARINATURA POLLO: taglia il pollo a dadini di 2cm. Mescola con 10ml soia + 10ml acqua + 8g maizena + un pizzico di bicarbonato (rende la carne più tenera). Marina 15 min.','SALSA KUNG PAO: mescola 20ml soia + 15ml aceto di riso nero + 10g zucchero + 50ml brodo di pollo + 7g maizena. Mescola bene finché lo zucchero è sciolto. Tieni vicino al fuoco.','Scala il wok a fuoco MASSIMO finché fuma. Aggiungi 30ml olio. Aggiungi i peperoncini secchi INTERI e il pepe del Sichuan: soffriggi 20-30 secondi finché l\'olio si aromatizza (non devono bruciare — devono diventare un po\' più scuri). Togli i peperoncini se non vuoi troppo piccante.','Aggiungi il pollo marinato in un unico strato: non muovere per 1 minuto per farlo dorare. Poi salta 2-3 min finché cotto. Togli.','Nel wok aggiungi un filo d\'olio, poi aglio tritato + zenzero: soffriggi 30 sec a fuoco vivace. Aggiungi il bianco del cipollotto 30 sec.','Rimetti il pollo. Versa la salsa kung pao dal bordo del wok. Mescola velocemente: la salsa si addenserà in 30-60 sec. Aggiungi le arachidi. Olio di sesamo. Cipollotto verde. Servi immediatamente sul riso.'],
['Marina il pollo e prepara la salsa tradizionalmente.','Nel boccale: olio + peperoncini + pepe sichuan: 1 min / 130°C / Vel. 1. Aggiungi aglio + zenzero: 1 min / 120°C / Vel. 1.','Aggiungi pollo marinato: 5 min / 120°C / Vel. 1 con farfalla. Aggiungi salsa: 2 min / 100°C / Vel. 1. Aggiungi arachidi e cipollotto fuori dal fuoco.']),

r('c3','Mapo Tofu',RC.cn,20,'media','🍲',
[i('tofu morbido (silken)',400,'g','tofu'),i('macinato di maiale',150,'g','maiale'),i('pasta doubanjiang (peperoncino fermentato)',30,'g','peperoncino'),i('pasta di fagioli neri fermentati',15,'g','peperoncino'),i('aglio',4,'pz','aglio'),i('zenzero fresco',15,'g','zenzero'),i('brodo di pollo',200,'ml','brodo'),i('salsa di soia',20,'ml','soia'),i('olio di pepe del Sichuan',5,'ml','sesamo'),i('maizena',15,'g','maizena'),i('cipollotto',2,'pz','cipollotto')],
['Taglia il tofu in dadini di 2cm. Mettilo in acqua leggermente salata tiepida 10 min: lo compatta e impedisce che si sbricioli durante la cottura. Scola delicatamente.','Mescola la maizena con 30ml di acqua fredda — questo è l\'addensante.','In un wok scalda 30ml di olio a fuoco vivace. Aggiungi il doubanjiang (pasta di peperoncino fermentato, base del mapo tofu) e soffriggi 1-2 min a fuoco medio finché l\'olio diventa rosso brillante e profumato. Aggiungi aglio e zenzero tritati: 30 sec.','Aggiungi il macinato di maiale sbriciolato: cuoci a fuoco vivace 3-4 min finché cotto. Aggiungi pasta di fagioli neri, soia.','Versa il brodo di pollo e porta a bollore. Aggiungi il tofu scolato con una spatola piatta, delicatissimamente per non romperlo. Cuoci 3-4 min lasciandolo sobbollire.','Aggiungi la maizena sciolta e mescola delicatamente: la salsa si addenserà in 1-2 min. Il mapo tofu deve avere una salsa "abbracciante" che avvolge ogni pezzo di tofu.','Versa nelle ciotole. Aggiungi olio di pepe del Sichuan (dà il caratteristico senso di formicolio sulla lingua) e cipollotto a rondelle. Servi con riso bianco.'],
['Soffriggi doubanjiang + aglio + zenzero con 30ml olio nel boccale: 3 min / 120°C / Vel. 1.','Aggiungi macinato: 4 min / 120°C / Vel. 1 con farfalla. Aggiungi pasta fagioli neri + soia + brodo: 3 min / 100°C / Vel. 1.','Aggiungi tofu delicatamente a dadini: 3 min / 90°C / Vel. 1 (temperatura bassa per non rompere il tofu). Aggiungi maizena sciolta: 1 min / 100°C / Vel. 2.']),

r('c5','Pollo in Agrodolce',RC.cn,30,'media','🍗',
[i('petto di pollo',350,'g','pollo'),i('peperone rosso',1,'pz','peperoni'),i('peperone giallo',1,'pz','peperoni'),i('ananas fresco o in scatola',150,'g','ananas'),i('cipolla',1,'pz','cipolla'),i('uovo',1,'pz','uova'),i('maizena',60,'g','maizena'),i('farina 00',30,'g','farina'),i('olio per friggere',500,'ml','olio'),i('ketchup',50,'g','ketchup'),i('aceto di riso bianco',40,'ml','aceto'),i('zucchero',40,'g','zucchero'),i('salsa di soia',15,'ml','soia'),i('succo di ananas',50,'ml','succo'),i('maizena per salsa',15,'g','maizena')],
['POLLO: taglia a bocconi di 3cm. Marina 10 min con 1 cucchiaio di soia.','PASTELLA CROCCANTE: sbatti 1 uovo. Mescola 50g maizena + 30g farina. Prima passa i bocconi nella maizena asciutta, poi nell\'uovo, poi nel mix farina-maizena. La doppia panatura crea una crosta più croccante che resiste alla salsa.','SALSA AGRODOLCE: in una ciotola mescola 50g ketchup + 40ml aceto di riso bianco + 40g zucchero + 15ml soia + 50ml succo di ananas + 10g maizena sciolta in 30ml acqua. Assaggia: deve bilanciare perfettamente dolce (ananas+zucchero), acido (aceto), sapido (soia+ketchup). Aggiusta a gusto.','Friggi il pollo in olio a 175°C per 4-5 min finché dorato e croccante. Scola su carta assorbente. Per una croccantezza extra: rifriggi 90 secondi a 190°C.','In un wok scalda 15ml olio a fuoco vivace. Aggiungi cipolla tagliata a quadrati + peperoni tagliati a quadrati 2-3 cm: salta 2-3 min — devono rimanere croccanti e colorati. Aggiungi l\'ananas a pezzi: 1 min.','Versa la salsa agrodolce nel wok e mescola: si addenserà in 30-60 sec. Quando bolle e diventa lucida e consistente, aggiungi il pollo fritto. Mescola velocemente per ricoprirlo uniformemente senza che perda la croccantezza. Servi IMMEDIATAMENTE con riso bianco.'],
['Prepara la salsa agrodolce nel Mambo: tutti gli ingredienti della salsa nel boccale: 5 min / 90°C / Vel. 3. La salsa si addenserà diventando lucida.','Soffriggi verdure in padella nel wok tradizionalmente.','Friggi il pollo in padella (il Mambo non è adatto). Combina tutto in padella con la salsa dal boccale.']),

r('c8','Wonton Soup',RC.cn,35,'media','🍵',
[i('pasta per wonton (dischetti o quadrati)',24,'pz','gyoza'),i('macinato di maiale',180,'g','maiale'),i('gamberi crudi sgusciati',80,'g','gamberi'),i('zenzero fresco grattugiato',12,'g','zenzero'),i('salsa di soia',20,'ml','soia'),i('olio di sesamo',12,'ml','sesamo'),i('cipollotto',2,'pz','cipollotto'),i('brodo di pollo',1000,'ml','brodo'),i('bok choy',150,'g','verdure'),i('pepe bianco',2,'g','pepe')],
['RIPIENO: trita finemente i gamberi (non frullare — devono avere consistenza). Mescola maiale + gamberi + zenzero + soia + sesamo + bianco del cipollotto tritato + pepe bianco. Impasta in una direzione finché il ripieno è appiccicoso e compatto.','FORMATURA WONTON: metti 1 cucchiaino di ripieno al centro di un quadrato di pasta. Bagna i bordi con acqua. Piega a triangolo schiacciando bene i bordi. Poi unisci i due angoli alla base portandoli verso di te attorno al ripieno e sovrapponi, fissando con una goccia d\'acqua. Questa è la forma classica del wonton.','Cuoci il bok choy in acqua bollente 1-2 min. Raffredda in acqua ghiacciata per mantenere il verde. Taglia a metà.','Scalda il brodo di pollo con zenzero a fettine. Aggiusta di sale e soia. Porta a bollore.','Cuoci i wonton nel brodo bollente: immergi delicatamente 3-4 alla volta. Sono pronti quando vengono a galla e la pasta è traslucida (~4-5 min). Scola con una schiumarola.','Distribuisci nelle ciotole: brodo caldo, wonton, bok choy. Aggiungi cipollotto verde, olio di sesamo e pepe bianco.'],
['Prepara ripieno nel boccale: maiale + gamberi grossolanamente tritati: 10 sec / Vel. 5. Aggiungi condimenti: 30 sec / Vel. 3 per amalgamare.','Forma i wonton a mano.','BRODO nel Mambo: brodo + zenzero: 10 min / 90°C / Vel. 1. Cuoci i wonton direttamente nel brodo nel boccale: 6 min / 100°C / Vel. 1 delicatamente. Poi trasferisci nelle ciotole.']),

// ===== ASIATICA =====
r('a1','Pad Thai',RC.as,25,'media','🍜',
[i('spaghetti di riso (3mm)',200,'g','riso'),i('gamberi medi sgusciati',200,'g','gamberi'),i('uova',2,'pz','uova'),i('germogli di soia freschi',100,'g','soia'),i('tofu sodo',100,'g','tofu'),i('salsa di pesce (nam pla)',40,'ml','salsa'),i('pasta di tamarindo sciolta in acqua',30,'g','tamarindo'),i('zucchero di palma o di canna',20,'g','zucchero'),i('aglio',3,'pz','aglio'),i('cipollotto',3,'pz','cipollotto'),i('arachidi tostate',50,'g','arachidi'),i('lime',1,'pz','lime'),i('olio di girasole',30,'ml','olio')],
['Immergi gli spaghetti di riso in acqua FREDDA per 30 min (non calda — diventeranno molli). Devono essere ancora leggermente duri al morso. Scola.','SALSA PAD THAI: mescola 40ml salsa di pesce + 30g pasta di tamarindo sciolta in 3 cucchiai d\'acqua calda + 20g zucchero. Assaggia: deve essere sapido-acido-dolce in equilibrio. Questa è la base del pad thai autentico.','Taglia il tofu sodo a dadini di 1.5cm. Friggi in 1 cucchiaio d\'olio finché dorato su tutti i lati. Togli.','Scalda il wok a fuoco MASSIMO finché fuma. Aggiungi 20ml olio. Soffriggi l\'aglio tritato 30 sec. Aggiungi i gamberi: cuoci 1-2 min finché rosa. Togli gamberi.','Aggiungi le noodles scolate nel wok caldo: mescola velocemente 1 min. Versa la salsa pad thai: mescola per 1-2 min finché le noodles la assorbono.','Sposta le noodles su un lato del wok. Nell\'altro lato rompi le 2 uova: strapazza velocemente 30 sec poi incorpora alle noodles.','Aggiungi gamberi, tofu e metà dei germogli. Mescola tutto a fuoco vivace 1 min. Spegni, aggiungi cipollotto verde e sesamo.','Impiatta. Guarnisci con germogli freschi, arachidi tritate grossolanamente, lime, peperoncino in polvere.'],
['Prepara la salsa nel Mambo: salsa di pesce + tamarindo + zucchero: 2 min / 60°C / Vel. 2 per sciogliere lo zucchero.','La cottura del pad thai richiede un wok a fuoco alto — è impossibile replicare nel Mambo. La "wok hei" (sapore del fuoco alto) è caratteristica fondamentale.']),

r('a2','Curry Verde Tailandese',RC.as,30,'media','🍛',
[i('petto o cosce di pollo',350,'g','pollo'),i('latte di cocco intero',400,'ml','cocco'),i('pasta di curry verde thai',35,'g','curry'),i('melanzane thai',150,'g','melanzane'),i('fagiolini',80,'g','fagiolini'),i('foglie di lime kaffir',4,'pz','lime'),i('lemongrass (citronella)',2,'steli','erbe'),i('salsa di pesce',25,'ml','salsa'),i('zucchero di palma',10,'g','zucchero'),i('olio di cocco',20,'ml','olio'),i('foglie di basilico thai',10,'g','basilico'),i('riso jasmine',200,'g','riso')],
['Cuoci il riso jasmine: sciacqua, copri con acqua (1:1.5), porta a bollore, abbassa al minimo, cuoci coperto 12 min + 5 min riposo.','In un wok o padella profonda scalda 20ml olio di cocco a fuoco medio. Aggiungi la pasta di curry verde e soffriggi 2-3 min mescolando continuamente: la pasta deve "aprirsi" diventando molto profumata e l\'olio deve colorirsi di verde.','Aggiungi 100ml di latte di cocco (il latte in cima alla lattina, più denso). Cuoci a fuoco medio-vivace 3-4 min mescolando finché si separa in olio e liquido — questo passaggio si chiama "fry in the coconut milk" ed è la base del curry thai.','Aggiungi il pollo tagliato a bocconi: cuoci 5 min a fuoco medio. Aggiungi il latte di cocco rimanente, lemongrass schiacciato, foglie di lime kaffir (strappa la nervatura centrale per liberare l\'aroma). Porta a bollore.','Abbassa la fiamma, aggiungi melanzane a quarti e fagiolini. Cuoci 8-10 min finché le verdure sono tenere.','Aggiusta di sapore con salsa di pesce (salato), zucchero di palma (dolce). Il curry verde deve avere un equilibrio di dolce-salato-speziato-cremoso.','Fuori dal fuoco aggiungi foglie di basilico thai (non cuocere — perdono colore e aroma). Rimuovi lemongrass prima di servire. Servi con riso.'],

const SK='dispensa_v2';

function load(){
  try{const d=JSON.parse(localStorage.getItem(SK)||'{}');items=d.items||[];}catch{items=[];}

  try{localStorage.setItem(SK,JSON.stringify({items,v:2,at:new Date().toISOString()}));}catch{alert('Errore salvataggio dati');}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function daysTo(ds){
  if(!ds)return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.ceil((new Date(ds)-t)/864e5);
}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(ds){
  if(!ds)return '';
  return new Date(ds).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
}

function freezeExp(origExp,cat){return addDays(origExp||today(),FREEZE_DAYS[cat]||60);}
function thawExp(cat){return addDays(today(),THAW_DAYS[cat]||2);}

function detectCat(name){
  const n=name.toLowerCase();
  for(const rule of CAT_RULES){
    if(rule.w.some(w=>n.includes(w)))return rule.c;
  }
  return'generico';
}

function showAlert(msg,type='warn',ms=3000){
  const el=document.getElementById('alert');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',ms);
}
function goTab(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(name==='dispensa')renderD();
  if(name==='ricette')renderR();
  if(name!=='aggiungi'&&scanRunning)closeScanner();
}
function setDF(f,el){
  df=f;
  document.querySelectorAll('#pg-dispensa .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');renderD();
}
function setRF(f,el){
  rf=f;
  document.querySelectorAll('[data-rf]').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');renderR();
}

function renderD(){
  const q=document.getElementById('dsearch').value.toLowerCase();
  let list=items.filter(it=>{
    if(q&&!it.name.toLowerCase().includes(q))return false;
    const d=daysTo(it.expiryDate);
    if(df==='presto')return!it.frozen&&d!==null&&d>=0&&d<=7;
    if(df==='frozen')return it.frozen;
    if(df==='scaduti')return d!==null&&d<0;
    return true;
  });
  list.sort((a,b)=>{
    const da=daysTo(a.expiryDate),db=daysTo(b.expiryDate);
    if(da===null&&db===null)return a.name.localeCompare(b.name);
    if(da===null)return 1;if(db===null)return-1;return da-db;
  });
  document.getElementById('st-tot').textContent=items.length;
  document.getElementById('st-exp').textContent=items.filter(it=>{const d=daysTo(it.expiryDate);return d!==null&&d>=0&&d<=7&&!it.frozen;}).length;
  document.getElementById('st-frz').textContent=items.filter(it=>it.frozen).length;

  const el=document.getElementById('dlist');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="eico">${q?'🔍':'🫙'}</div><div class="etit">${q?'Nessun risultato':'Dispensa vuota'}</div><div class="esub">${q?'Prova altro termine':'Aggiungi il primo alimento!'}</div></div>`;
    return;
  }
  el.innerHTML=list.map(it=>{
    const d=daysTo(it.expiryDate);
    let ec='',et='';
    if(it.expiryDate){
      if(d<0){ec='expired';et=`Scaduto ${-d}g fa`;}
      else if(d===0){ec='soon';et='Scade oggi!';}
      else if(d<=3){ec='soon';et=`Scade in ${d}g`;}
      else if(d<=7){ec='soon';et=`${fmtDate(it.expiryDate)}`;}
      else{ec='ok';et=fmtDate(it.expiryDate);}
    }
    let cc='';
    if(it.frozen)cc='frozen';
    else if(d!==null&&d<0)cc='expired';
    else if(d!==null&&d<=3)cc='expiring';
    const fb=it.frozen?`<span class="badge fr" style="margin-left:5px">❄</span>`:'';
    const tb=it.thawedDate?`<span class="badge wn" style="margin-left:4px">🌡</span>`:'';
    const freezeBtn=it.frozen
      ?`<button class="abtn wn" onclick="thawItem('${it.id}',event)">🌡 Scongela</button>`
      :`<button class="abtn fr" onclick="freezeItem('${it.id}',event)">❄ Congela</button>`;
    return`<div class="icard ${cc}" id="ic-${it.id}">
<div class="irow" onclick="toggleAct('${it.id}')">
  <div class="iico">${ico(it.category)}</div>
  <div class="iinfo">
    <div class="iname">${it.name}${fb}${tb}</div>
    <div class="imeta">${it.category||'generico'} · ${it.quantity} ${it.unit}</div>
    ${it.expiryDate?`<div class="iexp ${ec}">${et}</div>`:`<div class="iexp" style="color:var(--text3)">Nessuna scadenza</div>`}
  </div>
  <div style="color:var(--text3);font-size:18px">›</div>
</div>
<div class="iactions" id="ia-${it.id}">
  <button class="abtn ok" onclick="consumeItem('${it.id}',event)">🍴 Consumato</button>
  ${freezeBtn}
  <button class="abtn ac" onclick="openEdit('${it.id}',event)">✏️ Modifica</button>
  <button class="abtn dn" onclick="delItem('${it.id}',event)">🗑 Elimina</button>
</div>
</div>`;
  }).join('');
}

function toggleAct(id){
  const el=document.getElementById('ia-'+id);
  // Close others
  document.querySelectorAll('.iactions.open').forEach(e=>{if(e.id!=='ia-'+id)e.classList.remove('open');});
  el.classList.toggle('open');
}
function consumeItem(id,e){e&&e.stopPropagation();
  if(confirm('Segna come consumato ed elimina?')){items=items.filter(i=>i.id!==id);save();renderD();renderR();showAlert('✅ Rimosso','ok');}
}
function delItem(id,e){e&&e.stopPropagation();
  if(confirm('Eliminare definitivamente?')){items=items.filter(i=>i.id!==id);save();renderD();renderR();showAlert('🗑 Eliminato','warn');}
}
function freezeItem(id,e){e&&e.stopPropagation();
  const it=items.find(i=>i.id===id);if(!it)return;
  const orig=it.expiryDate||today();
  it.frozen=true;it.frozenDate=today();it.originalExpiry=orig;
  it.expiryDate=freezeExp(orig,it.category);
  save();renderD();showAlert(`❄ Congelato! Scadenza stimata: ${fmtDate(it.expiryDate)}`,'ok',4500);
}
function thawItem(id,e){e&&e.stopPropagation();
  const it=items.find(i=>i.id===id);if(!it)return;
  it.frozen=false;it.thawedDate=today();it.expiryDate=thawExp(it.category);
  save();renderD();showAlert(`🌡 Scongelato! Consumare entro: ${fmtDate(it.expiryDate)}`,'warn',5000);
}

// ================================================
// RENDER RICETTE
// ================================================
function findIng(name,key){
  if(!items.length)return null;
  const n=name.toLowerCase(),k=(key||'').toLowerCase();
  return items.find(it=>{
    const in2=it.name.toLowerCase();
    return in2.includes(n)||n.includes(in2)||(k&&(in2.includes(k)||k.split(' ').some(kw=>kw.length>2&&in2.includes(kw))));
  })||null;
}
function canMake(recipe){
  return recipe.ingredients.every(ing=>{
    const m=findIng(ing.name,ing.key);
    return m&&m.quantity>=ing.amt;
  });
}
function canMake1(recipe){
  // Can make for 1 person
  return recipe.ingredients.every(ing=>{
    const m=findIng(ing.name,ing.key);
    return m&&m.quantity>=ing.amt*0.5;
  });
}

function renderR(){
  const q=document.getElementById('rsearch').value.toLowerCase();
  let list=RECIPES.filter(r=>{
    if(q&&!r.name.toLowerCase().includes(q))return false;
    if(rf==='possibili'){return canMake(r)||canMake1(r);}
    if(rf!=='tutte'&&r.cat!==rf)return false;
    return true;
  });
  const CAT_LABELS={italiana:'🇮🇹 Italiana',europea:'🇪🇺 Europea',giapponese:'🇯🇵 Giapponese',cinese:'🇨🇳 Cinese',asiatica:'🌏 Asiatica'};
  const el=document.getElementById('rlist');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="eico">👨‍🍳</div><div class="etit">${rf==='possibili'?'Nessuna ricetta fattibile':'Nessuna ricetta'}</div><div class="esub">${rf==='possibili'?'Aggiungi più ingredienti per sbloccare ricette':'Prova con un altro filtro'}</div></div>`;
    return;
  }
  el.innerHTML=list.map(r=>{
    const ok=canMake(r),ok1=canMake1(r);
    const badge=ok?`<span style="color:var(--success);font-size:12px">✓ Tutto ok</span>`:ok1?`<span style="color:var(--warn);font-size:12px">⚡ Per 1 pers.</span>`:'';
    return`<div class="rcard" onclick="openR('${r.id}')">
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
  <div>
    <div class="rname">${r.icon} ${r.name}</div>
    <div class="rcat ${r.cat}">${CAT_LABELS[r.cat]||r.cat}</div>
  </div>
  <div style="text-align:right;flex-shrink:0">
    <div style="font-size:12px;color:var(--text2)">⏱ ${r.time}min · ${r.diff}</div>
    <div style="margin-top:3px">${badge}</div>
  </div>
</div>
<div class="ringr">${r.ingredients.slice(0,5).map(i=>i.name).join(', ')}${r.ingredients.length>5?` +${r.ingredients.length-5}`:''}</div>
</div>`;
  }).join('');
}

function openR(id){
  const r=RECIPES.find(x=>x.id===id);if(!r)return;
  const ok2=canMake(r),ok1=!ok2&&canMake1(r);
  const portions=ok2?2:1;
  const portionWarn=(!ok2&&ok1)?`<div class="portion-warn">⚡ Ingredienti sufficienti solo per <strong>1 persona</strong>.</div>`:'';
  const CAT_LABELS={italiana:'🇮🇹 Italiana',europea:'🇪🇺 Europea',giapponese:'🇯🇵 Giapponese',cinese:'🇨🇳 Cinese',asiatica:'🌏 Asiatica'};
  const ingrHtml=r.ingredients.map(ing=>{
    const m=findIng(ing.name,ing.key);
    const has=m&&m.quantity>=ing.amt*portions;
    const dot=has?'ok':'miss';
    const style=has?'':'color:var(--danger)';
    return`<div class="ingr-item"><div class="idot ${dot}"></div><span style="${style}">${ing.name}</span>${!m?'<span style="font-size:11px;color:var(--danger);margin-left:4px">mancante</span>':''}<span class="iqt">${ing.amt*portions} ${ing.unit}</span></div>`;
  }).join('');
  const stepsHtml=r.steps.map((s,i)=>`<div class="step"><div class="snum-n">${i+1}</div><div class="stxt">${s}</div></div>`).join('');
  const mamboHtml=r.mambo&&r.mambo.length
    ?`<div class="mambo-box">
<div class="mambo-title">🤖 Cecotec Mambo Touch</div>
${r.mambo.map((s,i)=>`<div class="step" style="margin-bottom:9px"><div class="snum-n" style="background:var(--freeze)">${i+1}</div><div class="stxt">${s}</div></div>`).join('')}
</div>`
    :`<div class="mambo-box" style="opacity:.5;font-size:13px;color:var(--text2)">🤖 Questa ricetta richiede cottura in padella/wok — non si può replicare nel Mambo.</div>`;
  document.getElementById('rbody').innerHTML=`
<div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px">${r.icon} ${r.name}</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--text2)"><span>${CAT_LABELS[r.cat]||r.cat}</span><span>⏱ ${r.time} min</span><span>⚡ ${r.diff}</span><span>👥 ${portions} pers.</span></div>
${portionWarn}
<div class="section-label">Ingredienti per ${portions} pers.</div>
<div style="margin-bottom:16px">${ingrHtml}</div>
<div class="section-label" style="margin-bottom:10px">Preparazione tradizionale</div>
<div style="margin-bottom:16px">${stepsHtml}</div>
${mamboHtml}`;
  document.getElementById('rmodal').classList.add('show');
}
function closeRModal(e,f){if(f||e?.target===document.getElementById('rmodal'))document.getElementById('rmodal').classList.remove('show');}

// ================================================
// EDIT MODAL
// ================================================
function openEdit(id,e){
  e&&e.stopPropagation();
  const it=items.find(i=>i.id===id);if(!it)return;
  editId=id;
  document.getElementById('en').value=it.name;
  document.getElementById('eq').value=it.quantity;
  document.getElementById('eu').value=it.unit;
  document.getElementById('ee').value=it.expiryDate||'';
  document.getElementById('ecat').value=it.category||'generico';
  document.getElementById('emodal').classList.add('show');
}
function saveEdit(){
  const it=items.find(i=>i.id===editId);if(!it)return;
  const name=document.getElementById('en').value.trim();
  const qty=parseFloat(document.getElementById('eq').value);
  if(!name){showAlert('Nome obbligatorio','err');return;}
  if(isNaN(qty)||qty<0){showAlert('Quantità non valida','err');return;}
  it.name=name;it.quantity=qty;it.unit=document.getElementById('eu').value;
  it.expiryDate=document.getElementById('ee').value||null;
  it.category=document.getElementById('ecat').value;
  save();closeEdit(null,1);renderD();showAlert('✅ Salvato','ok');
}
function closeEdit(e,f){if(f||e?.target===document.getElementById('emodal')){document.getElementById('emodal').classList.remove('show');editId=null;}}

// ================================================
// ADD FORM
// ================================================
let lastScanBarcode=null;

function onNameInput(){
  const v=document.getElementById('fn').value.trim();
  if(v.length>=2){
    const c=detectCat(v);
    document.getElementById('fc').value=c;
    const labels={carne:'🥩 Carne',pesce:'🐟 Pesce',verdure:'🥬 Verdure',frutta:'🍎 Frutta',latticini:'🧀 Latticini',pasta_cereali:'🍝 Pasta/Cereali',pane:'🍞 Pane',salumi:'🥓 Salumi',condimenti:'🫙 Condimenti',surgelati:'❄️ Surgelati',bevande:'🥤 Bevande',dolci:'🍰 Dolci',legumi:'🫘 Legumi',uova:'🥚 Uova',generico:''};
    const lbl=labels[c];
    document.getElementById('cat-hint').textContent=lbl&&c!=='generico'?`Categoria rilevata: ${lbl}`:'';
  } else {
    document.getElementById('cat-hint').textContent='';
  }
}

function onFreezeChange(){
  const frozen=document.getElementById('ff').checked;
  const lbl=document.getElementById('exp-lbl');
  lbl.textContent=frozen?'Scadenza originale *':'Scadenza';
  updateFreezeEst();
}
function updateFreezeEst(){
  const frozen=document.getElementById('ff').checked;
  const exp=document.getElementById('fe').value;
  const cat=document.getElementById('fc').value;
  const el=document.getElementById('fest');
  if(frozen){
    if(exp){
      const est=freezeExp(exp,cat);
      el.textContent=`❄ Scadenza stimata in cella: ${fmtDate(est)}`;
    } else {
      el.textContent='❄ Inserisci la scadenza per stimare quella in cella';
    }
  } else {
    el.textContent='';
  }
}
document.getElementById('fe').addEventListener('input',updateFreezeEst);
document.getElementById('fc').addEventListener('change',updateFreezeEst);

function clearForm(){
  document.getElementById('fn').value='';
  document.getElementById('fq').value='';
  document.getElementById('fu').value='pz';
  document.getElementById('fc').value='generico';
  document.getElementById('fe').value='';
  document.getElementById('ff').checked=false;
  document.getElementById('fest').textContent='';
  document.getElementById('exp-lbl').textContent='Scadenza';
  document.getElementById('cat-hint').textContent='';
  document.getElementById('scan-feedback').style.display='none';
  document.getElementById('scanbtn').className='scan-btn';
  document.getElementById('scanbtn').innerHTML='<span style="font-size:22px">📷</span><span>Scansiona Barcode</span>';
  lastScanBarcode=null;
}

function saveItem(){
  const name=document.getElementById('fn').value.trim();
  const qty=parseFloat(document.getElementById('fq').value);
  const unit=document.getElementById('fu').value;
  const cat=document.getElementById('fc').value;
  const frozen=document.getElementById('ff').checked;
  const exp=document.getElementById('fe').value;
  if(!name){showAlert('Il nome è obbligatorio','err');return;}
  if(isNaN(qty)||qty<=0){showAlert('Inserisci una quantità valida','err');return;}
  if(frozen&&!exp){showAlert('La scadenza originale è obbligatoria per la cella ❄','err');return;}
  let finalExp=null,origExp=null;
  if(frozen){origExp=exp;finalExp=freezeExp(exp,cat);}
  else{finalExp=exp||null;}
  items.push({id:uid(),name,quantity:qty,unit,category:cat,
    expiryDate:finalExp,originalExpiry:origExp,
    frozen,frozenDate:frozen?today():null,thawedDate:null,
    barcode:lastScanBarcode,addedDate:today()});
  save();clearForm();renderD();renderR();
  showAlert(`✅ "${name}" aggiunto!`,'ok');
}

// ================================================
// BARCODE SCANNER
// ================================================
function openScanner(){
  document.getElementById('scan-overlay').classList.add('show');
  document.getElementById('scan-status').textContent='Avvio fotocamera…';
  scanner=new Html5Qrcode('reader');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:140},aspectRatio:1.7},
    onScanOk, ()=>{})
    .then(()=>{
      scanRunning=true;
      document.getElementById('scan-status').textContent='Punta la fotocamera sul barcode';
    })
    .catch(err=>{
      document.getElementById('scan-status').textContent='❌ Camera non disponibile: '+err;
    });
}
function closeScanner(){
  if(scanner&&scanRunning){
    scanner.stop().then(()=>{scanner.clear();scanner=null;scanRunning=false;}).catch(()=>{});
  }
  document.getElementById('scan-overlay').classList.remove('show');
}
async function onScanOk(barcode){
  if(!scanRunning)return;
  closeScanner();
  lastScanBarcode=barcode;
  const fb=document.getElementById('scan-feedback');
  const btn=document.getElementById('scanbtn');
  fb.textContent=`📡 Ricerca prodotto…`;fb.style.display='block';
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data=await res.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name_it||p.product_name||p.generic_name||'';
      const qStr=p.quantity||'';
      let pq=1,pu='pz';
      const m=qStr.match(/(\d+\.?\d*)\s*(g|kg|ml|l)/i);
      if(m){pq=parseFloat(m[1]);pu=m[2].toLowerCase();}
      if(name){document.getElementById('fn').value=name;onNameInput();}
      if(pq)document.getElementById('fq').value=pq;
      document.getElementById('fu').value=pu;
      fb.textContent=`✅ Trovato: ${name||barcode} ${qStr?'('+qStr+')':''}`;
      btn.className='scan-btn scanning';
      btn.innerHTML=`<span style="font-size:22px">✅</span><span>Scansionato · Scansiona di nuovo</span>`;
    } else {
      fb.textContent=`⚠ Prodotto non trovato (${barcode}). Compila il nome manualmente.`;
      btn.className='scan-btn scanning';
      btn.innerHTML=`<span style="font-size:22px">🔄</span><span>Non trovato · Riprova</span>`;
    }
  }catch{
    fb.textContent=`⚠ Errore di rete. Barcode: ${barcode}`;
  }
}

// ================================================
// INIT
// ================================================
load();renderD();renderR();

// Swipe down to close recipe modal
let ty0=0;
document.getElementById('rsheet').addEventListener('touchstart',e=>ty0=e.touches[0].clientY);
document.getElementById('rsheet').addEventListener('touchmove',e=>{if(e.touches[0].clientY-ty0>70)closeRModal(null,1);});
</script>
