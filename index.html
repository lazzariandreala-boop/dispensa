<!DOCTYPE html>
<html lang="it">
<head>
<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  DISPENSA APP v3                                         ║
  ║  Features: dispensa, ricette, lista spesa, barcode scan  ║
  ║  Storage:  localStorage "dispensa_v3"                    ║
  ║  Layout:   iPad Chrome / Safari ottimizzato              ║
  ╚══════════════════════════════════════════════════════════╝
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🫙 Dispensa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
/* ================================================
   CSS VARIABLES & GLOBAL RESET
================================================ */
:root {
  --bg:#0a0a0d; --bg2:#131316; --bg3:#1b1b1f; --bg4:#232328;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --accent:#f07d1e; --accent2:#fba94c;
  --accent-dim:rgba(240,125,30,.13); --accent-glow:rgba(240,125,30,.28);
  --text:#f0ece6; --text2:#7a7a85; --text3:#44444c;
  --danger:#e05555; --danger-dim:rgba(224,85,85,.13);
  --success:#44c270; --success-dim:rgba(68,194,112,.13); --success-glow:rgba(68,194,112,.28);
  --freeze:#5b9be0; --freeze-dim:rgba(91,155,224,.13); --freeze-glow:rgba(91,155,224,.28);
  --warn:#e8be40;   --warn-dim:rgba(232,190,64,.13);   --warn-glow:rgba(232,190,64,.28);
  --r:18px; --rs:12px; --rc:14px;
  --shadow:0 12px 48px rgba(0,0,0,.8);
  --tabh:64px; --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 16px;
  overflow: hidden; -webkit-text-size-adjust: 100%;
}
body { display: flex; justify-content: center; }

/* ================================================
   LAYOUT — adattivo
   Su mobile/tablet (< 900px) occupa tutto lo schermo.
   Su desktop (≥ 900px) mostra colonna centrata max 520px
   affiancata da un pannello info laterale.
================================================ */
#wrap {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; position: relative;
}

/* Desktop: colonna principale + sidebar */
@media (min-width: 768px) {
  body { background: #0d0d0d; }
  #app-shell { display:flex;width:100%;height:100%;max-width:1200px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border); }
  #wrap { width:380px;min-width:320px;max-width:420px;border-right:1px solid var(--border);flex-shrink:0; }
  #sidebar { flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0; }
  #sidebar-inner { flex:1;overflow-y:auto;padding:16px 14px 40px;height:100%; }
  .sb-section { margin-bottom:14px; }
  .sb-section-title { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:9px;padding-left:2px; }
  .sb-btn { display:flex;align-items:center;gap:10px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text);transition:all .15s;text-align:left; }
  .sb-btn:hover { background:var(--bg3);border-color:var(--border2); }
  .sb-btn:active { transform:scale(.98);opacity:.8; }
  .sb-ico { font-size:20px;flex-shrink:0;width:28px;text-align:center; }
  .sb-txt { flex:1; }
  .sb-label { font-size:13px;font-weight:600;display:block; }
  .sb-sub { font-size:11px;color:var(--text2);margin-top:1px;display:block; }
  .sb-arrow { font-size:14px;color:var(--text3); }
  .sb-stats { display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px;width:100%; }
  .sb-stat { background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 8px;text-align:center;cursor:pointer;transition:border-color .15s; }
  .sb-stat .n { font-family:'Inter',sans-serif;font-weight:800;font-size:20px;line-height:1;display:block; }
  .sb-stat .l { font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-top:4px;display:block;line-height:1.3; }
  .sb-quick { background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;margin-bottom:20px; }
  .sb-quick-title { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:10px; }
  .sb-quick input,.sb-quick select { width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;margin-bottom:7px;transition:border-color .15s; }
  .sb-quick input:focus,.sb-quick select:focus { border-color:var(--accent); }
  .sb-quick .sq-row { display:flex;gap:7px; }
  .sb-quick .sq-row input { margin-bottom:0; }
  .sq-add { width:100%;margin-top:9px;padding:10px;border-radius:var(--rs);background:var(--accent);color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s; }
  .sq-add:hover { background:#d0731a; }
}
/* Mobile/tablet: niente sidebar */
@media (max-width:767px) {
  #app-shell { width:100%;height:100%; }
  #sidebar { display:none; }
  #wrap { max-width:100%; }
}

/* Header */
#hdr {
  padding: calc(var(--safe-top) + 14px) 18px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
#hdr h1 {
  font-family: 'Inter', sans-serif; font-weight: 800; font-size: 22px;
  letter-spacing: -.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Alert banner */
#alert { display: none; padding: 9px 18px; font-size: 13px; font-weight: 500; text-align: center; flex-shrink: 0; }
#alert.show { display: block; }
#alert.warn { background: var(--warn); color: #1a1200; }
#alert.err  { background: var(--danger); color: #fff; }
#alert.ok   { background: var(--success); color: #fff; }

/* Scrollable main area */
#main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tabh) + 8px);
}
.page { display: none; padding: 14px 14px 0; animation: fi .2s ease; }
.page.active { display: block; }
@keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

/* Bottom tab bar */
#tabs {
  height: var(--tabh); background: var(--bg2);
  border-top: 1px solid var(--border); display: flex;
  flex-shrink: 0; padding-bottom: var(--safe-bottom);
}
.tb {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; border: none; background: none;
  color: var(--text3); cursor: pointer; font-family: 'Inter', sans-serif;
  transition: color .2s; position: relative;
}
.tb.active { color: var(--accent); }
.tb .ico { font-size: 18px; line-height: 1; }
.tb .lbl { font-size: 9px; font-weight: 600; letter-spacing: .2px; }
/* Badge numerino sul tab spesa */
.tb-badge {
  position: absolute; top: 9px; right: calc(50% - 18px);
  background: var(--danger); color: #fff; border-radius: 10px;
  font-size: 9px; font-weight: 700; padding: 1px 5px; min-width: 16px;
  text-align: center; pointer-events: none; display: none;
}
.tb-badge.show { display: block; }

/* ================================================
   COMPONENTI CONDIVISI
================================================ */
/* Casella di ricerca */
.sbox {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 14px; display: flex; align-items: center; gap: 9px; margin-bottom: 12px;
}
.sbox input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif;
}
.sbox input::placeholder { color: var(--text3); }

/* Chip filtro */
.frow { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 12px; scrollbar-width: none; }
.frow::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 12px;
  font-weight: 600; border: 1px solid var(--border); cursor: pointer;
  background: var(--bg2); color: var(--text2); transition: all .15s; white-space: nowrap;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Card generica */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px; }
.stitle { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 12px; }

/* Badge */
.badge { border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.badge.fr { background: var(--freeze); color: #fff; }
.badge.wn { background: var(--warn);   color: #1a1200; }
.badge.dn { background: var(--danger); color: #fff; }

/* Stato vuoto */
.empty { text-align: center; padding: 52px 20px; color: var(--text3); }
.empty .eico { font-size: 52px; margin-bottom: 12px; }
.empty .etit { font-family: 'Inter', sans-serif; font-size: 18px; color: var(--text2); margin-bottom: 6px; }
.empty .esub { font-size: 13px; }

/* Divisore */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* Label sezione */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text3); margin-bottom: 8px;
}

/* ================================================
   STAT CARDS — pulsanti filtro (4 in griglia)
================================================ */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
.scard {
  background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 11px 6px; text-align: center; cursor: pointer; transition: all .18s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.scard:active { opacity: .75; transform: scale(.97); }
/* Stato attivo con colore specifico per tipo */
.scard.sf-tutti   { border-color: var(--accent);  background: rgba(232,130,30,.1); }
.scard.sf-presto  { border-color: var(--warn);    background: rgba(224,184,85,.1); }
.scard.sf-frozen  { border-color: var(--freeze);  background: rgba(91,155,224,.1); }
.scard.sf-scaduti { border-color: var(--danger);  background: rgba(224,85,85,.1); }
/* Numero grande */
.snum { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 22px; line-height: 1; }
.slbl { font-size: 9px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

/* ================================================
   ITEM CARD (dispensa)
================================================ */
.icard {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 9px; overflow: hidden; transition: border-color .15s;
}
.icard.expiring { border-left: 3px solid var(--warn); }
.icard.expired  { border-left: 3px solid var(--danger); opacity: .8; }
.icard.frozen   { border-left: 3px solid var(--freeze); }

.irow {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; cursor: pointer;
}
.irow:active { background: var(--bg3); }
.iico  { font-size: 28px; flex-shrink: 0; width: 38px; text-align: center; }
.iinfo { flex: 1; min-width: 0; }
.iname { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.imeta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.iexp  { font-size: 12px; font-weight: 600; margin-top: 3px; }
.iexp.ok      { color: var(--success); }
.iexp.soon    { color: var(--warn); }
.iexp.expired { color: var(--danger); }

/* Barra azioni inline */
.iactions { display: none; border-top: 1px solid var(--border); padding: 10px 12px; background: var(--bg3); gap: 7px; flex-wrap: wrap; }
.iactions.open { display: flex; }
.abtn {
  padding: 8px 14px; border-radius: var(--rs); font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid; background: transparent;
  font-family: 'Inter', sans-serif; transition: opacity .15s; white-space: nowrap;
}
.abtn:active { opacity: .6; }
.abtn.ok { color: var(--success); border-color: var(--success); }
.abtn.fr { color: var(--freeze);  border-color: var(--freeze); }
.abtn.dn { color: var(--danger);  border-color: var(--danger); }
.abtn.wn { color: var(--warn);    border-color: var(--warn); }
.abtn.ac { color: var(--accent);  border-color: var(--accent); }

/* ================================================
   RECIPE CARDS
================================================ */
.rcard {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all .15s;
}
.rcard:active { background: var(--bg3); }
.rname { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; }
.rcat  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }
.rcat.italiana   { color: var(--accent); }
.rcat.europea    { color: var(--freeze); }
.rcat.giapponese { color: var(--danger); }
.rcat.cinese     { color: var(--warn);   }
.rcat.asiatica   { color: var(--success);}
.ringr { font-size: 11px; color: var(--text3); margin-top: 5px; }

/* ================================================
   RECIPE MODAL (bottom sheet)
================================================ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.78);
  z-index: 100; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--bg2); border-radius: 22px 22px 0 0; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 18px 18px calc(22px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  border-top: 1px solid var(--border);
}
.overlay.show .sheet { transform: translateY(0); }
.handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.mclose {
  position: absolute; top: 18px; right: 18px; width: 32px; height: 32px;
  border-radius: 50%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Ingredienti ricetta */
.ingr-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.ingr-item:last-child { border-bottom: none; }
.idot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.idot.ok   { background: var(--success); }
.idot.miss { background: var(--danger); }
.iqt { margin-left: auto; color: var(--text2); font-size: 12px; flex-shrink: 0; }

/* Passaggi ricetta */
.step     { display: flex; gap: 11px; margin-bottom: 12px; }
.step-num {
  width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.stxt { font-size: 13px; line-height: 1.65; color: var(--text2); flex: 1; }

.portion-warn {
  background: rgba(224,184,85,.12); border: 1px solid var(--warn);
  border-radius: var(--rs); padding: 10px 13px; margin-bottom: 13px; font-size: 12px; color: var(--warn);
}

/* Box Mambo Touch */
.mambo-box {
  background: rgba(91,155,224,.07); border: 1px solid rgba(91,155,224,.3);
  border-radius: var(--rs); padding: 13px 15px; margin-top: 16px;
}
.mambo-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--freeze); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* ================================================
   LISTA DELLA SPESA
================================================ */
/* Gruppo per categoria */
.shop-group { margin-bottom: 20px; }
.shop-cat-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text3); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 2px;
}
/* Singolo item spesa */
.shop-item {
  display: flex; align-items: center; gap: 11px; padding: 12px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--rs); margin-bottom: 6px; transition: opacity .2s;
}
.shop-item.checked { opacity: .45; }
.shop-item.checked .shop-name { text-decoration: line-through; color: var(--text3); }
/* Checkbox cerchio */
.shop-check {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border2);
  background: transparent; flex-shrink: 0; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.shop-check.checked { background: var(--success); border-color: var(--success); }
.shop-name { flex: 1; font-size: 14px; font-weight: 500; }
/* Pulsante elimina */
.shop-del {
  width: 30px; height: 30px; border-radius: var(--rs); background: transparent;
  border: 1px solid var(--border); color: var(--text3); cursor: pointer;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.shop-del:active { background: var(--danger); border-color: var(--danger); color: #fff; }

/* ================================================
   FORM AGGIUNGI
================================================ */
.scan-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; padding: 14px; border-radius: var(--r);
  background: var(--bg3); border: 1.5px dashed var(--border2);
  color: var(--text2); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif; margin-bottom: 16px; transition: all .2s;
}
.scan-btn:active  { opacity: .7; }
.scan-btn.scanning { border-color: var(--accent); color: var(--accent); background: rgba(232,130,30,.08); }
#scan-feedback {
  display: none; background: rgba(91,191,126,.1); border: 1px solid var(--success);
  border-radius: var(--rs); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: var(--success);
}
.fl { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 3px; }
.fi {
  width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rs);
  padding: 9px 12px; color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif; outline: none; -webkit-appearance: none; transition: border-color .15s;
}
.fi:focus { border-color: var(--accent); }
.fi::placeholder { color: var(--text3); }
.fg  { margin-bottom: 6px; }
.fr2 { display: flex; gap: 9px; }
.fr2 .fg { flex: 1; }
/* Toggle freezer */
.sw-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--rs); margin-bottom: 14px;
}
.sw-t { font-size: 14px; font-weight: 500; }
.sw-s { font-size: 11px; color: var(--text2); margin-top: 2px; }
.tgl  { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.tgl input { opacity: 0; width: 0; height: 0; }
.tgl-s {
  position: absolute; inset: 0; cursor: pointer; background: var(--bg3);
  border-radius: 14px; transition: background
